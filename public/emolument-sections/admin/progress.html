<script>
  (function () {
    const TOKEN = localStorage.getItem('token');
    const PAGE_SIZE = 10;

    let _allShips = [];   // flat list of all ship rows (from all commands)
    let _filtered = [];   // after search + command filter
    let _page = 1;

    function N(v) { return (!v && v !== 0) ? '0' : Number(v).toLocaleString(); }

    /* ── Load data ── */
    function load() {
      if (!TOKEN) return;
      fetch('/reports/progress', { headers: { Authorization: 'Bearer ' + TOKEN } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (res) {
          if (!res) return;
          /* Route does res.json(result.data) — handle both shapes */
          const payload = (res.commands !== undefined) ? res : (res.data || null);
          if (payload) render(payload);
        })
        .catch(function () {
          document.getElementById('pr-table-wrap').innerHTML =
            '<div class="pr-empty" style="color:#f87171;">Failed to load report</div>';
        });
    }

    /* ── Render ── */
    function render(data) {
      const commands = data.commands || [];

      /* Flatten all ships into one list, carry commandName */
      _allShips = [];
      const commandNames = [];

      commands.forEach(function (cmd) {
        if (cmd.commandName && commandNames.indexOf(cmd.commandName) === -1) {
          commandNames.push(cmd.commandName);
        }
        (cmd.ships || []).forEach(function (s) {
          _allShips.push(Object.assign({}, s, { commandName: cmd.commandName || 'Unassigned' }));
        });
      });

      /* Populate command filter */
      const sel = document.getElementById('pr-command');
      const existing = Array.from(sel.options).map(function (o) { return o.value; });
      commandNames.forEach(function (c) {
        if (existing.indexOf(c) === -1) {
          const opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c;
          sel.appendChild(opt);
        }
      });

      /* Summary stats from all ships */
      const totShips = _allShips.length;
      const totPersonnel = _allShips.reduce(function (a, s) { return a + Number(s.total || 0); }, 0);
      const totCompleted = _allShips.reduce(function (a, s) { return a + Number(s.completed || 0); }, 0);
      const totNotFiled = _allShips.reduce(function (a, s) { return a + Number(s.not_filed || 0); }, 0);
      const overallPct = totPersonnel > 0 ? Math.round(totCompleted / totPersonnel * 100) : 0;

      document.getElementById('pr-s-ships').textContent = N(totShips);
      document.getElementById('pr-s-total').textContent = N(totPersonnel);
      document.getElementById('pr-s-completed').textContent = N(totCompleted);
      document.getElementById('pr-s-comp-pct').textContent = overallPct + '% overall';
      document.getElementById('pr-s-notfiled').textContent = N(totNotFiled);

      /* Apply any active filters and render table */
      prApplyFilters();
    }

    /* ── Filter logic ── */
    window.prApplyFilters = function () {
      const q = (document.getElementById('pr-search').value || '').toLowerCase().trim();
      const command = (document.getElementById('pr-command').value || '').toLowerCase().trim();

      _filtered = _allShips.filter(function (s) {
        const matchShip = !q || (s.ship_name || '').toLowerCase().includes(q);
        const matchCommand = !command || (s.commandName || '').toLowerCase() === command;
        return matchShip && matchCommand;
      });

      _page = 1;
      renderTable();
    };

    window.prClearFilters = function () {
      document.getElementById('pr-search').value = '';
      document.getElementById('pr-command').value = '';
      prApplyFilters();
    };

    /* ── Table render ── */
    function renderTable() {
      const wrap = document.getElementById('pr-table-wrap');
      const countEl = document.getElementById('pr-count');
      const total = _filtered.length;

      if (countEl) countEl.textContent = total.toLocaleString() + ' ship(s)';

      if (!total) {
        wrap.innerHTML = '<div class="pr-empty">No ships found</div>';
        document.getElementById('pr-pagination').classList.add('hidden');
        return;
      }

      const totalPages = Math.ceil(total / PAGE_SIZE);
      const start = (_page - 1) * PAGE_SIZE;
      const pageRows = _filtered.slice(start, start + PAGE_SIZE);

      wrap.innerHTML =
        '<table class="pr-table">' +
        '<thead><tr>' +
        '<th>Ship Name</th>' +
        '<th>Command</th>' +
        '<th style="text-align:right">Total</th>' +
        '<th style="text-align:right">Filled</th>' +
        '<th style="text-align:right">DO Reviewed</th>' +
        '<th style="text-align:right">FO Approved</th>' +
        '<th style="text-align:right">Confirmed</th>' +
        '<th style="text-align:right">Not Filed</th>' +
        '<th style="text-align:right">% Done</th>' +
        '</tr></thead>' +
        '<tbody>' +
        pageRows.map(function (s) {
          const pct = s.completion_pct !== undefined
            ? parseFloat(s.completion_pct)
            : (s.total > 0 ? Math.round(s.completed / s.total * 100) : 0);
          const pctCls = pct >= 75 ? 'pr-pct-green' : pct >= 40 ? 'pr-pct-amber' : 'pr-pct-red';
          return '<tr>' +
            '<td class="ship-name">' + (s.ship_name || '—') + '</td>' +
            '<td style="color:rgba(30,64,175,0.45);font-size:0.65rem;">' + (s.commandName || '—') + '</td>' +
            '<td class="num">' + N(s.total) + '</td>' +
            '<td class="num-muted">' + N(s.submitted) + '</td>' +
            '<td class="num-muted">' + N(s.do_reviewed) + '</td>' +
            '<td class="num-muted">' + N(s.fo_approved) + '</td>' +
            '<td class="num" style="color:#166534;">' + N(s.cpo_confirmed) + '</td>' +
            '<td class="num"><span class="pr-nf">' + N(s.not_filed) + '</span></td>' +
            '<td style="text-align:right;"><span class="pr-pct ' + pctCls + '">' + pct + '%</span></td>' +
            '</tr>';
        }).join('') +
        '</tbody>' +
        '</table>';

      /* Pagination controls */
      const pgEl = document.getElementById('pr-pagination');
      const pgInfo = document.getElementById('pr-pg-info');
      const prev = document.getElementById('pr-prev');
      const next = document.getElementById('pr-next');

      if (totalPages > 1) {
        pgEl.classList.remove('hidden');
        if (pgInfo) pgInfo.textContent = 'Page ' + _page + ' of ' + totalPages;
        if (prev) prev.disabled = (_page <= 1);
        if (next) next.disabled = (_page >= totalPages);
      } else {
        pgEl.classList.add('hidden');
      }
    }

    /* ── Page change ── */
    window.prChangePage = function (dir) {
      const totalPages = Math.ceil(_filtered.length / PAGE_SIZE);
      _page = Math.max(1, Math.min(totalPages, _page + dir));
      renderTable();
    };

    /* ── Generate / Print report ── */
    window.prGenerateReport = function () {
      var rows = _filtered;
      if (!rows.length) { alert('No data to export. Load the report first.'); return; }

      var now = new Date();
      var dateStr = now.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      var timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: true });
      var genBy = localStorage.getItem('full_name') || 'System User';

      var searchVal = (document.getElementById('pr-search').value || '').trim();
      var commandVal = (document.getElementById('pr-command').value || '').trim();
      var filterNote = [
        commandVal ? 'Command: ' + commandVal : '',
        searchVal ? 'Ship: ' + searchVal : '',
      ].filter(Boolean).join(' · ') || 'All Ships';

      var totTotal = rows.reduce(function (a, s) { return a + Number(s.total || 0); }, 0);
      var totSubmitted = rows.reduce(function (a, s) { return a + Number(s.submitted || 0); }, 0);
      var totDO = rows.reduce(function (a, s) { return a + Number(s.do_reviewed || 0); }, 0);
      var totFO = rows.reduce(function (a, s) { return a + Number(s.fo_approved || 0); }, 0);
      var totConf = rows.reduce(function (a, s) { return a + Number(s.cpo_confirmed || 0); }, 0);
      var totCompleted = rows.reduce(function (a, s) { return a + Number(s.completed || 0); }, 0);
      var totNotFiled = rows.reduce(function (a, s) { return a + Number(s.not_filed || 0); }, 0);
      var overallPct = totTotal > 0 ? (totCompleted / totTotal * 100).toFixed(1) : '0.0';

      function NP(v) { return (!v && v !== 0) ? '0' : Number(v).toLocaleString(); }

      function pctCell(pct) {
        var p = parseFloat(pct);
        var color = p >= 75 ? '#166534' : p >= 40 ? '#92400e' : '#991b1b';
        return '<span style="font-weight:800;color:' + color + ';">' + p + '%</span>';
      }

      var tableRows = rows.map(function (s) {
        var pct = s.completion_pct !== undefined
          ? parseFloat(s.completion_pct)
          : (s.total > 0 ? Math.round(s.completed / s.total * 100) : 0);
        return '<tr>' +
          '<td>' + (s.ship_name || '—') + '</td>' +
          '<td>' + (s.commandName || '—') + '</td>' +
          '<td class="r">' + NP(s.total) + '</td>' +
          '<td class="r">' + NP(s.submitted) + '</td>' +
          '<td class="r">' + NP(s.do_reviewed) + '</td>' +
          '<td class="r">' + NP(s.fo_approved) + '</td>' +
          '<td class="r" style="color:#166534;font-weight:700;">' + NP(s.cpo_confirmed) + '</td>' +
          '<td class="r" style="color:#991b1b;font-weight:700;">' + NP(s.not_filed) + '</td>' +
          '<td class="r">' + pctCell(pct) + '</td>' +
          '</tr>';
      }).join('');

      var totRow =
        '<tr style="border-top:1.5px solid #1e40af;font-weight:bold;">' +
        '<td colspan="2">TOTAL — ' + rows.length + ' ship(s)</td>' +
        '<td class="r">' + NP(totTotal) + '</td>' +
        '<td class="r">' + NP(totSubmitted) + '</td>' +
        '<td class="r">' + NP(totDO) + '</td>' +
        '<td class="r">' + NP(totFO) + '</td>' +
        '<td class="r" style="color:#166534;">' + NP(totConf) + '</td>' +
        '<td class="r" style="color:#991b1b;">' + NP(totNotFiled) + '</td>' +
        '<td class="r">' + pctCell(overallPct) + '</td>' +
        '</tr>';

      /* ── Stat strip: rendered as a plain single-row table so print engines
            honour column widths and don't stretch boxes to full page height ── */
      /* var statStrip =
        '<table class="stat-tbl"><tr>' +
        '<td><div class="sl">TOTAL PERSONNEL</div><div class="sv">' + NP(totTotal) + '</div></td>' +
        '<td><div class="sl">COMPLETED</div><div class="sv">' + NP(totCompleted) + '</div><div class="ss">' + overallPct + '% overall</div></td>' +
        '<td><div class="sl">IN PIPELINE</div><div class="sv">' + NP(totSubmitted + totDO + totFO) + '</div></td>' +
        '<td><div class="sl">CPO CONFIRMED</div><div class="sv">' + NP(totConf) + '</div></td>' +
        '<td><div class="sl">NOT FILED</div><div class="sv">' + NP(totNotFiled) + '</div></td>' +
        '</tr></table>';*/

      var html =
        '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Progress Report</title><style>' +
        '@page{size:A4 landscape;margin:10mm}' +
        'body{font-family:Helvetica,Arial,sans-serif;font-size:8pt;margin:0;padding:0;color:#333;position:relative}' +
        'body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;' +
        'background-image:url("../photos/logo.png");background-size:auto 100%;' +
        'background-repeat:no-repeat;background-position:center;opacity:0.02;z-index:-1;pointer-events:none}' +

        /* Header — identical to payments report */
        '.hdr-wrap{display:flex;align-items:flex-start;margin-bottom:8px;border-bottom:2px solid #1a1a1a;padding-bottom:5px}' +
        '.hdr{flex:1;text-align:center}' +
        '.hdr h1{font-size:13pt;font-weight:bold;margin:0 0 2px;letter-spacing:1.5px;color:#1e40af;font-family:"Libre Baskerville",Georgia,serif}' +
        '.hdr h2{font-size:10pt;font-weight:normal;margin:2px 0 0;color:#4a4a4a;font-family:"Libre Baskerville",Georgia,serif}' +

        /* Meta row — identical structure to payments report */
        '.meta{display:flex;justify-content:space-between;align-items:center;margin:10px 0;font-size:9pt}' +

        /* Stat strip as table — avoids browser stretching flex boxes */
        '.stat-tbl{width:100%;border-collapse:separate;border-spacing:4px;margin-bottom:8px}' +
        '.stat-tbl td{border:0.5px solid rgba(30,64,175,0.2);border-radius:4px;padding:4px 6px;vertical-align:top;width:20%}' +
        '.sl{font-size:6pt;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:rgba(30,64,175,0.5);margin-bottom:2px}' +
        '.sv{font-size:13pt;font-weight:900;color:#1e40af;line-height:1.15}' +
        '.ss{font-size:6pt;color:rgba(30,64,175,0.4);margin-top:1px}' +

        /* Data table */
        'table.data{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:7.5pt}' +
        'table.data th{color:#1e40af;padding:6px 4px;text-align:left;font-weight:bold;font-size:7pt;' +
        'text-transform:uppercase;letter-spacing:0.3px;border-bottom:1.5px solid #1e40af}' +
        'table.data td{padding:5px 4px;border:none;vertical-align:middle;border-bottom:0.5px solid rgba(30,64,175,0.08)}' +
        'td.r{text-align:right}' +

        /* Footer */
