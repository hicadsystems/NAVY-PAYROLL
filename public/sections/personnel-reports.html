<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<script>
  const auth = window.authService;
  const personnelRadios = document.querySelectorAll('input[name="personnelScope"]');

  const wrappers = {
    rank: document.getElementById("rankWrapper"),
    location: document.getElementById("locationWrapper"),
    pfa: document.getElementById("pfaWrapper"),
    gradetype: document.getElementById("gradetypeWrapper"),
    gradelevel: document.getElementById("gradelevelWrapper"),
    bank: document.getElementById("bankWrapper"),
    state: document.getElementById("stateWrapper"),
    emolument: document.getElementById("emolumentWrapper"),
    rent: document.getElementById("rentWrapper"),
    taxed: document.getElementById("taxedWrapper"),
    oldemployees: document.getElementById("oldemployeesWrapper")
  };

  const exportFormatStandalone = document.getElementById("exportFormatStandalone");

  const exportFormatHTML = `
    <div>
      <label class="block text-sm font-medium text-gray-900 mb-2"><i class="fas fa-file-export text-gray-600 mr-2"></i>Export Format</label>
      <div class="flex gap-4">
        <label class="flex items-center cursor-pointer"><input type="radio" name="exportFormat" value="pdf" class="text-blue-600 w-4 h-4" checked><span class="ml-2">PDF</span></label>
        <label class="flex items-center cursor-pointer"><input type="radio" name="exportFormat" value="excel" class="text-blue-600 w-4 h-4"><span class="ml-2">Excel</span></label>
        <label class="hidden flex items-center cursor-pointer"><input type="radio" name="exportFormat" value="json" class="text-blue-600 w-4 h-4"><span class="ml-2">JSON</span></label>
      </div>
    </div>`;

  const selects = {
    rank: document.getElementById("rankSelect"),
    location: document.getElementById("locationSelect"),
    pfa: document.getElementById("pfaSelect"),
    gradetype: document.getElementById("gradetypeSelect"),
    gradelevel: document.getElementById("gradelevelSelect"),
    bank: document.getElementById("bankSelect"),
    state: document.getElementById("stateSelect"),
    emolument: document.getElementById("emolumentSelect"),
    rent: document.getElementById("rentSelect"),
    taxed: document.getElementById("taxedSelect"),
    oldemployees: document.getElementById("oldemployeesSelect")
  };

  const generatePersonnelBtn = document.getElementById("generatePersonnel");
  const cancelPersonnelBtn = document.getElementById("cancelPersonnel");
  const personnelModal = document.getElementById("personnelModal");
  const personnelModalTitle = document.getElementById("personnelModalTitle");
  const personnelModalMessage = document.getElementById("personnelModalMessage");
  const personnelModalIcon = document.getElementById("personnelModalIcon");
  const personnelModalCloseBtn = document.getElementById("personnelModalCloseBtn");
  const loadingModal = document.getElementById("loadingModal");

  let filterOptions = null;

  async function loadFilterOptions() {
    try {
      const token = localStorage.getItem('token') || '';
      const response = await auth.fetchWithAuth('/personnel-report/filter-options', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const result = await response.json();
      if (result.success) {
        filterOptions = result.data;
        populateDropdown(selects.rank, filterOptions.titles);
        populateDropdown(selects.location, filterOptions.locations);
        populateDropdown(selects.pfa, filterOptions.pfas);
        populateDropdown(selects.gradetype, filterOptions.gradeTypes);
        populateDropdown(selects.gradelevel, filterOptions.gradeLevels);
        populateDropdown(selects.bank, filterOptions.bankBranches);
        populateDropdown(selects.state, filterOptions.states);
        populateDropdown(selects.emolument, filterOptions.emolumentForms);
        populateDropdown(selects.rent, filterOptions.rentSubsidy);
        populateDropdown(selects.taxed, filterOptions.taxedStatus);
        populateDropdown(selects.oldemployees, filterOptions.oldEmployeesOptions);
      }
    } catch (error) {
      console.error('Error loading filter options:', error);
      showPersonnelModal('Error', 'Failed to load filter options. Please refresh the page.', true);
    }
  }

  function populateDropdown(selectElement, data) {
    if (!data || data.length === 0) return;
    data.forEach(item => {
      const option = document.createElement('option');
      option.value = item.code;
      option.textContent = item.description;
      selectElement.appendChild(option);
    });
  }

  function showPersonnelModal(title, message, isError = false) {
    personnelModalTitle.textContent = title;
    personnelModalMessage.textContent = message;
    personnelModalIcon.innerHTML = isError
      ? '<i class="fas fa-exclamation-circle text-red-500"></i>'
      : '<i class="fas fa-check-circle text-green-500"></i>';
    personnelModal.classList.remove("hidden");
  }

  personnelModalCloseBtn.onclick = () => personnelModal.classList.add("hidden");

  function hideAllWrappers() {
    Object.values(wrappers).forEach(wrapper => wrapper.classList.add("hidden"));
    exportFormatStandalone.classList.remove("hidden");
  }

  function updateExportFormatDisplay(scope) {
    document.querySelectorAll('.exportFormatSection').forEach(section => { section.innerHTML = ''; });
    if (scope === 'all') {
      exportFormatStandalone.classList.remove("hidden");
    } else {
      exportFormatStandalone.classList.add("hidden");
      const activeWrapper = wrappers[scope];
      if (activeWrapper) {
        const exportSection = activeWrapper.querySelector('.exportFormatSection');
        if (exportSection) exportSection.innerHTML = exportFormatHTML;
      }
    }
  }

  personnelRadios.forEach(radio => {
    radio.addEventListener('change', () => {
      hideAllWrappers();
      const scope = radio.value;
      if (scope !== 'all' && wrappers[scope]) wrappers[scope].classList.remove("hidden");
      updateExportFormatDisplay(scope);
    });
  });

  // ── Generate ────────────────────────────────────────────────────
  generatePersonnelBtn.onclick = async () => {
    const selectedScope = document.querySelector('input[name="personnelScope"]:checked')?.value;
    const exportFormat = document.querySelector('input[name="exportFormat"]:checked')?.value || 'pdf';

    if (!selectedScope) return showPersonnelModal("Validation Error", "Please select a report scope!", true);

    let queryParams = `format=${exportFormat}`;
    if (selectedScope !== 'all') {
      const filterValue = selects[selectedScope]?.value;
      if (!filterValue) return showPersonnelModal("Validation Error", "Please select a value for the chosen filter!", true);
      const paramMap = { rank: 'title', location: 'location', pfa: 'pfa', gradetype: 'gradetype', gradelevel: 'gradelevel', bank: 'bankBranch', state: 'stateOfOrigin', emolument: 'emolumentForm', rent: 'rentSubsidy', taxed: 'taxed' };
      queryParams += `&${paramMap[selectedScope]}=${encodeURIComponent(filterValue)}`;
    }

    loadingModal.classList.remove("hidden");

    try {
      const token = localStorage.getItem('token') || '';
      const response = await auth.fetchWithAuth(`/personnel-report?${queryParams}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      if (exportFormat === 'json') {
        const result = await response.json();
        loadingModal.classList.add("hidden");
        if (result.success) showPersonnelModal("Success", `Report generated successfully! Found ${result.data.length} personnel records.`);
        else showPersonnelModal("Error", result.error || "Failed to generate report", true);
      } else {
        const blob = await response.blob();
        loadingModal.classList.add("hidden");

        window.personnelCurrentBlob = blob;
        window.personnelCurrentFormat = exportFormat;

        const iframe = document.getElementById('personnelPreviewIframe');
        const dlBtn = document.getElementById('personnelDownloadPreviewBtn');

        if (exportFormat === 'pdf') {
          const blobUrl = window.URL.createObjectURL(blob);
          window.personnelCurrentBlobUrl = blobUrl;
          iframe.src = blobUrl + '#toolbar=0';
          iframe.style.minHeight = '842px';
          dlBtn.textContent = 'Download PDF';
        } else {
          iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
            <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
          </div>`;
          iframe.style.minHeight = '300px';
          dlBtn.textContent = 'Download Excel';
        }
        document.getElementById('personnelPreviewModal').classList.remove('hidden');
      }
    } catch (error) {
      loadingModal.classList.add("hidden");
      console.error('Error generating report:', error);
      showPersonnelModal("Error", `Failed to generate report: ${error.message}`, true);
    }
  };

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('personnelPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('personnelPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.personnelCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.personnelCurrentBlobUrl);
      window.personnelCurrentBlobUrl = null;
    }
  }

  document.getElementById('personnelClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('personnelCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('personnelDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.personnelCurrentBlob) return;
    const fmt = window.personnelCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.personnelCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `personnel_report_${new Date().toISOString().split('T')[0]}.${fmt === 'excel' ? 'xlsx' : 'pdf'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);
    showPersonnelModal("Success", "Report downloaded successfully!");
  });

  cancelPersonnelBtn.onclick = () => {
    hideAllWrappers();
    Object.values(selects).forEach(select => { select.value = ""; });
    document.querySelector('input[name="personnelScope"][value="all"]').checked = true;
    document.querySelector('input[name="exportFormat"][value="pdf"]').checked = true;
    updateExportFormatDisplay('all');
  };

  loadFilterOptions();
  updateExportFormatDisplay('all');
</script>
