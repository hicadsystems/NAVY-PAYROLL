<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up { animation: grow-up 0.6s ease-in-out infinite alternate; position: absolute; bottom: 0; }
  .animate-grow-down { animation: grow-down 0.6s ease-in-out infinite alternate; position: absolute; top: 0; }
  .animate-expand { animation: expand 0.6s ease-in-out infinite alternate; }
</style>

<!-- Salary Summary Report -->
<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Salary Summary Report</h2>

  <form id="salarySummaryForm" class="space-y-4">
    <div>
      <label for="summaryYear" class="block text-sm font-medium mb-1">Processing Year</label>
      <input type="number" id="summaryYear" class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>
    <div>
      <label for="summaryMonth" class="block text-sm font-medium mb-1">Processing Month</label>
      <select id="summaryMonth" class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <option value="">Select Month</option>
        <option>January</option><option>February</option><option>March</option>
        <option>April</option><option>May</option><option>June</option>
        <option>July</option><option>August</option><option>September</option>
        <option>October</option><option>November</option><option>December</option>
      </select>
    </div>
    <div>
      <label for="summaryLocation" class="block text-sm font-medium mb-1">Location/Branch</label>
      <select id="summaryLocation" class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <option value="">All Locations</option>
      </select>
    </div>
    <div class="hidden">
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="summaryFormat" value="pdf" checked><span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="summaryFormat" value="excel"><span>Excel</span>
        </label>
      </div>
    </div>
    <div class="flex justify-end items-center gap-2 mb-4">
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="summaryClearBtn" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="summaryGenerateBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
  </form>
</section>

<!-- Confirm Modal -->
<div id="summaryConfirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue with report generation?</p>
    <div class="flex justify-end gap-2">
      <button id="summaryCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="summaryContinueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Processing Modal -->
<div id="summaryProcessingModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mb-2 mx-auto">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2"></div>
    </div>
    <p class="text-gray-700">Generating report...</p>
  </div>
</div>

<!-- Success Modal -->
<div id="summarySuccessModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="summarySuccessMessage">Report generated successfully!</p>
    <button id="summarySuccessOkBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="summaryErrorModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p id="summaryErrorText" class="mb-6 text-gray-700">Please complete required fields.</p>
    <button id="summaryErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal — portrait: max-w-4xl -->
<div id="summaryPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">Salary Summary Preview</h3>
      <button id="summaryClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>
    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="summaryPreviewIframe" title="Salary Summary Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;"></iframe>
    </div>
    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="summaryCancelPreviewBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="summaryDownloadPreviewBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/salarysummary';

  const summaryYear = document.getElementById('summaryYear');
  const summaryMonth = document.getElementById('summaryMonth');
  const summaryLocation = document.getElementById('summaryLocation');
  const summaryGenerateBtn = document.getElementById('summaryGenerateBtn');
  const summaryClearBtn = document.getElementById('summaryClearBtn');

  const summaryConfirmModal = document.getElementById('summaryConfirmModal');
  const summaryCancelBtn = document.getElementById('summaryCancelBtn');
  const summaryContinueBtn = document.getElementById('summaryContinueBtn');

  const summaryProcessingModal = document.getElementById('summaryProcessingModal');
  const summarySuccessModal = document.getElementById('summarySuccessModal');
  const summarySuccessOkBtn = document.getElementById('summarySuccessOkBtn');
  const summarySuccessMessage = document.getElementById('summarySuccessMessage');

  const summaryErrorModal = document.getElementById('summaryErrorModal');
  const summaryErrorOkBtn = document.getElementById('summaryErrorOkBtn');
  const summaryErrorText = document.getElementById('summaryErrorText');

  function getMonthNumber(monthName) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months.indexOf(monthName) + 1;
  }
  function getMonthName(monthNum) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months[monthNum - 1] || '';
  }

  async function loadLocations() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.locations) {
          summaryLocation.innerHTML = '<option value="">All Locations</option>';
          result.data.locations.forEach(loc => {
            const option = document.createElement('option');
            option.value = loc.location_code;
            option.textContent = loc.location_name || loc.location_code;
            summaryLocation.appendChild(option);
          });
        }
      }
    } catch (error) { console.error('Error loading locations:', error); }
  }

  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const period = result.data.currentPeriod;
          summaryYear.value = period.year;
          summaryMonth.value = getMonthName(period.month);
        }
      }
    } catch (error) { console.error('Error loading current period:', error); }
  }

  summaryGenerateBtn.addEventListener('click', () => {
    if (!summaryYear.value) {
      summaryErrorText.textContent = 'Please select a year.';
      summaryErrorModal.classList.remove('hidden'); return;
    }
    if (!summaryMonth.value) {
      summaryErrorText.textContent = 'Please select a processing month.';
      summaryErrorModal.classList.remove('hidden'); return;
    }
    summaryConfirmModal.classList.remove('hidden');
  });

  summaryCancelBtn.addEventListener('click', () => summaryConfirmModal.classList.add('hidden'));

  summaryContinueBtn.addEventListener('click', async () => {
    summaryConfirmModal.classList.add('hidden');
    summaryProcessingModal.classList.remove('hidden');
    summaryGenerateBtn.disabled = true;

    const format = document.querySelector('input[name="summaryFormat"]:checked').value;
    const monthNum = getMonthNumber(summaryMonth.value);

    try {
      const token = localStorage.getItem('token');
      const params = new URLSearchParams({ format, year: summaryYear.value, month: monthNum });
      if (summaryLocation.value) params.append('location', summaryLocation.value);

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET', headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();
      summaryProcessingModal.classList.add('hidden');
      summaryGenerateBtn.disabled = false;

      window.summaryCurrentBlob = blob;
      window.summaryCurrentFormat = format;
      window.summaryCurrentMonth = summaryMonth.value;
      window.summaryCurrentYear = summaryYear.value;

      const iframe = document.getElementById('summaryPreviewIframe');
      const dlBtn = document.getElementById('summaryDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.summaryCurrentBlobUrl = blobUrl;
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('summaryPreviewModal').classList.remove('hidden');

    } catch (error) {
      summaryProcessingModal.classList.add('hidden');
      summaryGenerateBtn.disabled = false;
      summaryErrorText.textContent = error.message || 'Failed to generate report. Please try again.';
      summaryErrorModal.classList.remove('hidden');
      console.error('Error:', error);
    }
  });

  function closePreview() {
    document.getElementById('summaryPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('summaryPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.summaryCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.summaryCurrentBlobUrl);
      window.summaryCurrentBlobUrl = null;
    }
  }

  document.getElementById('summaryClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('summaryCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('summaryDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.summaryCurrentBlob) return;
    const fmt = window.summaryCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.summaryCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `salary_summary_${window.summaryCurrentYear}_${window.summaryCurrentMonth}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url);

    summarySuccessMessage.textContent = 'Report downloaded successfully!';
    summarySuccessModal.classList.remove('hidden');
  });

  summarySuccessOkBtn.addEventListener('click', () => {
    summarySuccessModal.classList.add('hidden');
    document.getElementById('salarySummaryForm').reset();
    loadCurrentPeriod();
  });
  summaryErrorOkBtn.addEventListener('click', () => summaryErrorModal.classList.add('hidden'));

  summaryClearBtn.addEventListener('click', () => {
    setTimeout(() => {
      summaryYear.value = '';
      summaryMonth.value = '';
      summaryLocation.value = '';
      loadCurrentPeriod();
    }, 0);
  });

  loadLocations();
  loadCurrentPeriod();
</script>
