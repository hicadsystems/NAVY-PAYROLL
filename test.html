<style>
  @page {
    size: A5;
    margin: 10mm;
    margin-top: 0.2mm;
    margin-bottom: 0.2mm;
    background-color: #f8fbff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    background: #1e2a3a;
    min-height: 100%;
  }

  body {
    font-family: 'Helvetica', 'Arial', sans-serif;
    font-size: 7pt;
    color: #1a1a1a;
    line-height: 1.2;
    position: relative;
    background-color: #f8fbff;
    width: 559px;
    min-height: 794px;
    margin: 16px auto;
    padding: 10mm;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
  }

  body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url("${logoUrl}");
    background-size: auto 100%;
    background-repeat: no-repeat;
    background-position: center center;
    opacity: 0.01;
    pointer-events: none;
  }

  @media print {
    body {
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }

    body::before {
      position: fixed;
      display: block;
    }
  }

  .container {
    width: 100%;
    padding: 10px;
    page-break-after: always;
  }

  .container:last-child {
    page-break-after: auto;
  }

  .header-wrapper {
    display: flex;
    align-items: flex-start;
    margin-bottom: 8px;
    border-bottom: 2px solid #1a1a1a;
    padding-bottom: 5px;
  }

  .className {
    flex-shrink: 0;
    margin-right: 20px;
    align-self: center;
    font-size: 9pt;
  }

  .header {
    flex-grow: 1;
    text-align: center;
  }

  .header h1 {
    font-size: 13pt;
    font-weight: bold;
    margin-bottom: 2px;
    letter-spacing: 1.5px;
    color: #1e40af;
    font-family: 'Libre Baskerville', Georgia, serif;
  }

  .header h2 {
    font-size: 10pt;
    font-weight: normal;
    margin-top: 2px;
    color: #4a4a4a;
    font-family: 'Libre Baskerville', Georgia, serif;
  }

  .pay-period {
    width: 100%;
    margin: 3px 0;
    padding: 3px 6px;
    font-size: 7pt;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #fafafa;
  }

  .pp-left,
  .pp-right {
    color: #4a4a4a;
    white-space: nowrap;
  }

  .pp-left strong,
  .pp-right strong {
    color: #1a1a1a;
  }

  .pp-center {
    flex-grow: 1;
    text-align: center;
    font-size: 7pt;
    font-weight: bold;
    color: #1a1a1a;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 0 5px;
    white-space: nowrap;
    font-family: "Times New Roman", Times, serif;
    font-style: italic;
  }

  .section-header {
    font-size: 8pt;
    font-weight: bold;
    margin-top: 3px;
    margin-bottom: 4px;
    padding: 2px 5px;
    color: #1e40af;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    width: 70%;
  }

  .source-header {
    font-size: 8.5pt;
    font-weight: bold;
    margin-top: 6px;
    margin-bottom: 2px;
    padding: 3px 6px;
    color: #1e40af;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    width: 70%;
    text-align: center;
    border-bottom: 1.5px solid #1e40af;
  }

  .employee-info {
    margin-bottom: 6px;
    padding: 2px 6px;
    background-color: #fafafa;
    border: 1px solid #d0d0d0;
    width: 70%;
  }

  .info-row {
    display: flex;
    padding: 2px 0;
    font-size: 7pt;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-row:last-child {
    border-bottom: none;
  }

  .info-label {
    font-weight: 600;
    min-width: 85px;
    flex-shrink: 0;
    color: #1a1a1a;
  }

  .info-value {
    flex-grow: 1;
    color: #4a4a4a;
  }

  .full-row {
    width: 100%;
    display: flex;
    align-items: flex-start;
  }

  .full-row .left-zone {
    width: 70%;
    flex-shrink: 0;
  }

  .full-row .right-zone {
    width: 30%;
    flex-shrink: 0;
    padding-left: 8px;
  }

  .lbal-header-row {
    width: 100%;
    display: flex;
    align-items: flex-end;
    margin-bottom: 2px;
  }

  .lbal-header-row .lh-spacer {
    width: 70%;
    flex-shrink: 0;
  }

  .lbal-header-row .lh-labels {
    width: 30%;
    display: flex;
    justify-content: space-between;
    padding-left: 12px;
    padding-right: 4px;
    padding-bottom: 3px;
    box-sizing: border-box;
  }

  .lh-col {
    font-size: 7pt;
    font-weight: 600;
    color: #4a4a4a;
  }

  .lh-col.lbal {
    text-align: left;
  }

  .lh-col.osmths {
    text-align: right;
  }

  .items-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 0;
  }

  .items-table col.col-desc {
    width: auto;
  }

  .items-table col.col-amount {
    width: 80px;
  }

  .items-table thead {
    border-bottom: 1px solid #1a1a1a;
  }

  .items-table th {
    font-size: 7pt;
    font-weight: 600;
    padding: 1px 4px;
    text-align: left;
    color: #1a1a1a;
  }

  .items-table th.amount-col {
    text-align: right;
  }

  .items-table tbody tr {
    border-bottom: 1px solid #f0f0f0;
  }

  .items-table tbody td {
    padding: 1px 4px;
    font-size: 7pt;
    vertical-align: middle;
    color: #4a4a4a;
  }

  .items-table tbody td.amount {
    text-align: right;
    white-space: nowrap;
    font-family: 'Courier New', monospace;
    color: #1a1a1a;
    font-weight: 700;
    font-size: 7.5pt;
    padding-right: 8px;
  }

  .rz-rows {
    width: 100%;
  }

  .rz-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 13px;
    padding: 1px 4px 1px 12px;
    box-sizing: border-box;
  }

  .rz-empty {
    border: none !important;
    visibility: hidden;
  }

  .rz-lbal {
    text-align: left;
    font-family: 'Courier New', monospace;
    font-size: 7pt;
    font-weight: 600;
    color: #1a1a1a;
  }

  .rz-osmths {
    text-align: right;
    font-family: 'Courier New', monospace;
    font-size: 7pt;
    font-weight: 600;
    color: #7c3aed;
  }

  .rz-dim {
    color: #d0d0d0;
  }

  .total-row {
    background-color: #f5f5f5;
    border-top: 1px solid #d0d0d0;
    border-bottom: 1px solid #d0d0d0;
    padding: 2px 6px;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    font-weight: 600;
    width: 70%;
  }

  .total-row .label {
    text-transform: uppercase;
    color: #1a1a1a;
  }

  .total-row .amount {
    text-align: right;
    min-width: 90px;
    font-family: 'Courier New', monospace;
    color: #1a1a1a;
    font-weight: 700;
  }

  .net-pay {
    background-color: #f0f0f0;
    border: 2px solid #1a1a1a;
    padding: 5px 6px;
    margin: 4px 0;
    display: flex;
    justify-content: space-between;
    font-size: 9pt;
    font-weight: bold;
    width: 70%;
  }

  .net-pay .label {
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .net-pay .amount {
    text-align: right;
    min-width: 80px;
    font-family: 'Courier New', monospace;
    font-weight: 800;
  }

  .stamp-area {
    margin-top: 6px;
    width: 70%;
    display: flex;
    justify-content: flex-end;
  }

  .stamp-box {
    border: 2px dashed #1e40af;
    width: 90px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6pt;
    color: #9ca3af;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .footer {
    margin-top: 3px;
    padding-top: 1px;
    border-top: 2px solid #d0d0d0;
    text-align: center;
    font-size: 6pt;
    color: #6a6a6a;
  }

  .footer p {
    margin: 1px 0;
  }

  .footer p:first-child {
    font-weight: 600;
    color: #4a4a4a;
  }
</style>
