<!-- National Housing Funds Report -->
<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">National Housing Funds (NHF) Report</h2>

  <form id="nhfForm" class="space-y-4">
    <!-- Year Selection -->
    <div>
      <label for="nhfYear" class="block text-sm font-medium mb-1">Processing Year</label>
      <input type="number" id="nhfYear"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
    </div>

    <!-- Processing Month -->
    <div>
      <label for="nhfMonth" class="block text-sm font-medium mb-1">Processing Month</label>
      <select id="nhfMonth"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <option value="">Select Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
      </select>
    </div>

    <!-- Output Format -->
    <div>
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="nhfFormat" value="pdf" checked>
          <span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="nhfFormat" value="excel">
          <span>Excel</span>
        </label>
      </div>
    </div>

    <div class="flex justify-end items-center gap-2 mb-4">
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="nhfClearBtn"
          class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="nhfGenerateBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
  </form>
</section>

<!-- Confirm Modal -->
<div id="nhfConfirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue with report generation?</p>
    <div class="flex justify-end gap-2">
      <button id="nhfCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="nhfContinueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Processing Modal -->
<div id="nhfProcessingModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <p class="text-gray-700">Generating report...</p>
  </div>
</div>

<!-- Success Modal -->
<div id="nhfSuccessModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="nhfSuccessMessage">Report generated successfully!</p>
    <button id="nhfSuccessOkBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="nhfErrorModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p id="nhfErrorText" class="mb-6 text-gray-700">Please complete required fields.</p>
    <button id="nhfErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal -->
<div id="nhfPreviewModal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">NHF Report Preview</h3>
      <button id="nhfClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>

    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="nhfPreviewIframe" title="NHF Report Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;">
      </iframe>
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="nhfCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="nhfDownloadPreviewBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/nhf';

  const nhfYear = document.getElementById('nhfYear');
  const nhfMonth = document.getElementById('nhfMonth');
  const nhfGenerateBtn = document.getElementById('nhfGenerateBtn');
  const nhfClearBtn = document.getElementById('nhfClearBtn');

  const nhfConfirmModal = document.getElementById('nhfConfirmModal');
  const nhfCancelBtn = document.getElementById('nhfCancelBtn');
  const nhfContinueBtn = document.getElementById('nhfContinueBtn');

  const nhfProcessingModal = document.getElementById('nhfProcessingModal');
  const nhfSuccessModal = document.getElementById('nhfSuccessModal');
  const nhfSuccessOkBtn = document.getElementById('nhfSuccessOkBtn');
  const nhfSuccessMessage = document.getElementById('nhfSuccessMessage');

  const nhfErrorModal = document.getElementById('nhfErrorModal');
  const nhfErrorOkBtn = document.getElementById('nhfErrorOkBtn');
  const nhfErrorText = document.getElementById('nhfErrorText');

  // ── Helpers ─────────────────────────────────────────────────────
  function getMonthNumber(monthName) {
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];
    return months.indexOf(monthName) + 1;
  }

  function getMonthName(monthNum) {
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];
    return months[monthNum - 1] || '';
  }

  // ── Load current period ─────────────────────────────────────────
  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const period = result.data.currentPeriod;
          nhfYear.value = period.year;
          nhfMonth.value = getMonthName(period.month);
        }
      }
    } catch (error) {
      console.error('Error loading current period:', error);
    }
  }

  // ── Validate & show confirm ─────────────────────────────────────
  nhfGenerateBtn.addEventListener('click', () => {
    if (!nhfYear.value) {
      nhfErrorText.textContent = 'Please select a year.';
      nhfErrorModal.classList.remove('hidden'); return;
    }
    if (!nhfMonth.value) {
      nhfErrorText.textContent = 'Please select a processing month.';
      nhfErrorModal.classList.remove('hidden'); return;
    }
    nhfConfirmModal.classList.remove('hidden');
  });

  nhfCancelBtn.addEventListener('click', () => nhfConfirmModal.classList.add('hidden'));

  // ── Generate — fetch blob, show in preview iframe ───────────────
  nhfContinueBtn.addEventListener('click', async () => {
    nhfConfirmModal.classList.add('hidden');
    nhfProcessingModal.classList.remove('hidden');
    nhfGenerateBtn.disabled = true;

    const format = document.querySelector('input[name="nhfFormat"]:checked').value;
    const monthNum = getMonthNumber(nhfMonth.value);

    try {
      const token = localStorage.getItem('token');

      const params = new URLSearchParams({
        format,
        year: nhfYear.value,
        month: monthNum
      });

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();

      nhfProcessingModal.classList.add('hidden');
      nhfGenerateBtn.disabled = false;

      // Store blob for download — no second fetch needed
      window.nhfCurrentBlob = blob;
      window.nhfCurrentFormat = format;
      window.nhfCurrentMonth = nhfMonth.value;
      window.nhfCurrentYear = nhfYear.value;

      const iframe = document.getElementById('nhfPreviewIframe');
      const dlBtn = document.getElementById('nhfDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.nhfCurrentBlobUrl = blobUrl; // store to revoke on close
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('nhfPreviewModal').classList.remove('hidden');

    } catch (error) {
      nhfProcessingModal.classList.add('hidden');
      nhfGenerateBtn.disabled = false;
      nhfErrorText.textContent = error.message || 'Failed to generate report. Please try again.';
      nhfErrorModal.classList.remove('hidden');
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('nhfPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('nhfPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.nhfCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.nhfCurrentBlobUrl);
      window.nhfCurrentBlobUrl = null;
    }
  }

  document.getElementById('nhfClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('nhfCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('nhfDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.nhfCurrentBlob) return;
    const fmt = window.nhfCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.nhfCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nhf_report_${window.nhfCurrentYear}_${window.nhfCurrentMonth}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url); // revoke immediately after trigger

    nhfSuccessMessage.textContent = 'Report downloaded successfully!';
    nhfSuccessModal.classList.remove('hidden');
  });

  // ── Success OK — reset form ─────────────────────────────────────
  nhfSuccessOkBtn.addEventListener('click', () => {
    nhfSuccessModal.classList.add('hidden');
    document.getElementById('nhfForm').reset();
    loadCurrentPeriod();
  });

  nhfErrorOkBtn.addEventListener('click', () => nhfErrorModal.classList.add('hidden'));

  nhfClearBtn.addEventListener('click', () => {
    setTimeout(() => {
      nhfYear.value = '';
      nhfMonth.value = '';
      loadCurrentPeriod();
    }, 0);
  });

  // ── Init ────────────────────────────────────────────────────────
  loadCurrentPeriod();
</script>
