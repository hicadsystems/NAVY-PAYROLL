<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Print Out-Of-Range payments Reports</h2>
  <form id="printInRangeForm" class="space-y-4">
    <div>
      <label class="block font-medium mb-2">Select Bank</label>
      <div class="flex space-x-4">
        <label class="flex items-center text-sm space-x-2"><input type="radio" id="allBanksInRange"
            name="bankChoiceInRange" value="all" checked><span>All Banks</span></label>
        <label class="flex items-center text-sm space-x-2"><input type="radio" id="specificBankInRange"
            name="bankChoiceInRange" value="specific"><span>Specific Bank</span></label>
      </div>
    </div>
    <div id="bankSelectInRangeContainer" class="hidden">
      <label for="bankNameInRange" class="block text-sm font-medium mb-1">Bank Name</label>
      <select id="bankNameInRange" name="bankNameInRange"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
        <option value="">Select Bank</option>
      </select>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="processingMonthInRange" class="block text-sm font-medium mb-1">Processing Month</label>
        <select id="processingMonthInRange"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Select Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div>
        <label for="processingYearInRange" class="block text-sm font-medium mb-1">Processing Year</label>
        <input type="number" id="processingYearInRange"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500"
          placeholder="e.g., 2025" min="2020" max="2099">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="minAmount" class="block text-sm font-medium mb-1">Min Amount <span
            class="text-red-500">*</span></label>
        <input type="number" id="minAmount" step="0.01"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500"
          placeholder="e.g., -1000">
      </div>
      <div>
        <label for="maxAmount" class="block text-sm font-medium mb-1">Max Amount <span
            class="text-red-500">*</span></label>
        <input type="number" id="maxAmount" step="0.01"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500"
          placeholder="e.g., 1000">
      </div>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <label class="block font-medium">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2"><input type="radio" name="bankFormatInRange" value="pdf"
            checked><span>PDF</span></label>
        <label class="flex text-sm items-center space-x-2"><input type="radio" name="bankFormatInRange"
            value="excel"><span>Excel</span></label>
      </div>
    </div>
    <div class="flex justify-between items-center gap-2 mb-4">
      <div class="flex items-center space-x-2">
        <input type="checkbox" id="summaryReportInRange" class="h-4 w-4">
        <label for="summaryReportInRange" class="text-sm">Summary Report</label>
      </div>
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="clearPrintInRangeBtn"
          class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="printInRangeBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
    <div id="allClassesInRangeSection" class="border-t pt-4" style="display: none;">
      <div class="flex items-center space-x-2 mb-3">
        <input type="checkbox" id="allClassesInRangeCheck" class="h-4 w-4">
        <label for="allClassesInRangeCheck" class="text-sm font-medium">Generate for All Classes</label>
      </div>
      <div id="specificClassInRangeContainer" class="hidden">
        <label for="specificClassInRangeSelect" class="block text-sm font-medium mb-1">Or Select Specific Class</label>
        <select id="specificClassInRangeSelect"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500">
          <option value="">Continue with All Classes</option>
        </select>
      </div>
    </div>
  </form>
</section>

<!-- Preview Modal (portrait) -->
<div id="rangePreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 px-6 py-2 flex justify-between items-center bg-navy">
      <h3 class="text-lg font-semibold text-white">Out-Of-Range Payments Preview</h3>
      <button id="rangeClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>
    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="rangePreviewIframe" title="Out-Of-Range Payments Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;"></iframe>
    </div>
    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="rangeCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="rangeDownloadPreviewBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="bankInRangeLoadingIndicator" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <span>Generating in-range report...</span>
  </div>
</div>

<!-- Success Modal -->
<div id="rangeSuccessModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6 text-center">
    <i class="fas fa-check-circle text-green-500 text-4xl mb-3"></i>
    <h3 class="text-lg font-semibold mb-2">Success</h3>
    <p id="rangeSuccessMessage" class="text-gray-700 mb-4">Report downloaded successfully!</p>
    <button id="rangeSuccessOkBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="printInRangeErrorModal"
  class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p class="mb-6 text-gray-700" id="bankInRangeErrorMessage">Please complete all required fields.</p>
    <button id="printInRangeErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE_IN_RANGE = '/rangepayments';
  const allBanksInRange = document.getElementById("allBanksInRange");
  const specificBankInRange = document.getElementById("specificBankInRange");
  const bankNameInRange = document.getElementById("bankNameInRange");
  const bankSelectInRangeContainer = document.getElementById("bankSelectInRangeContainer");
  const processingMonthInRange = document.getElementById("processingMonthInRange");
  const processingYearInRange = document.getElementById("processingYearInRange");
  const minAmount = document.getElementById("minAmount");
  const maxAmount = document.getElementById("maxAmount");
  const printInRangeBtn = document.getElementById("printInRangeBtn");
  const bankInRangeLoadingIndicator = document.getElementById("bankInRangeLoadingIndicator");
  const allClassesInRangeCheck = document.getElementById("allClassesInRangeCheck");
  const specificClassInRangeContainer = document.getElementById("specificClassInRangeContainer");
  const specificClassInRangeSelect = document.getElementById("specificClassInRangeSelect");
  const bankInRangeErrorMessage = document.getElementById("bankInRangeErrorMessage");
  const printInRangeErrorModal = document.getElementById("printInRangeErrorModal");
  document.getElementById('printInRangeErrorOkBtn').addEventListener("click", () => printInRangeErrorModal.classList.add("hidden"));
  document.getElementById('rangeSuccessOkBtn').onclick = () => document.getElementById('rangeSuccessModal').classList.add('hidden');

  function showError(msg) { bankInRangeErrorMessage.textContent = msg; printInRangeErrorModal.classList.remove("hidden"); }

  function closePreview() {
    document.getElementById('rangePreviewModal').classList.add('hidden');
    const iframe = document.getElementById('rangePreviewIframe');
    iframe.src = 'about:blank'; iframe.removeAttribute('srcdoc');
    if (window.rangeCurrentBlobUrl) { window.URL.revokeObjectURL(window.rangeCurrentBlobUrl); window.rangeCurrentBlobUrl = null; }
  }

  document.getElementById('rangeClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('rangeCancelPreviewBtn').addEventListener('click', closePreview);
  document.getElementById('rangeDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.rangeCurrentBlob) return;
    const fmt = window.rangeCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.rangeCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = window.rangeCurrentFilename;
    document.body.appendChild(a); a.click(); a.remove();
    window.URL.revokeObjectURL(url);
    document.getElementById('rangeSuccessMessage').textContent = 'Report downloaded successfully!';
    document.getElementById('rangeSuccessModal').classList.remove('hidden');
  });

  async function loadBanksInRange() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE_IN_RANGE}/filter-options`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.bank) {
          bankNameInRange.innerHTML = '<option value="">Select Bank</option>';
          result.data.bank.forEach(bank => { const o = document.createElement('option'); o.value = bank.Bankcode; o.textContent = bank.Bankcode + ' - ' + (bank.branchname || bank.bankbranch); bankNameInRange.appendChild(o); });
        }
        if (result.success && result.data.currentPeriod) {
          const period = result.data.currentPeriod;
          processingYearInRange.value = period.year;
          processingMonthInRange.value = period.month;
        }
      }
    } catch (error) { console.error('Error loading banks:', error); }
  }

  async function loadPayrollClassesInRange() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE_IN_RANGE}/payroll-classes`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const allClassesInRangeSection = document.getElementById('allClassesInRangeSection');
          if (result.data.isMasterDb) {
            allClassesInRangeSection.style.display = 'block';
            specificClassInRangeSelect.innerHTML = '<option value="">Continue with All Classes</option>';
            result.data.classes.forEach(cls => { if (!cls.isCurrent) { const o = document.createElement('option'); o.value = cls.name; o.textContent = cls.displayName; specificClassInRangeSelect.appendChild(o); } });
          } else { allClassesInRangeSection.style.display = 'none'; }
        }
      }
    } catch (error) { console.error('Error loading payroll classes:', error); }
  }

  function toggleBankInputInRange() { bankSelectInRangeContainer.classList.toggle('hidden', allBanksInRange.checked); }
  function toggleSpecificClassSelectInRange() { specificClassInRangeContainer.classList.toggle('hidden', !allClassesInRangeCheck.checked); }

  allBanksInRange.addEventListener("change", toggleBankInputInRange);
  specificBankInRange.addEventListener("change", toggleBankInputInRange);
  allClassesInRangeCheck.addEventListener("change", toggleSpecificClassSelectInRange);

  printInRangeBtn.addEventListener("click", async () => {
    if (!processingMonthInRange.value) return showError('Please select a processing month.');
    if (!processingYearInRange.value) return showError('Please enter a processing year.');
    if (!minAmount.value || minAmount.value.trim() === '') return showError('Please enter a minimum amount.');
    if (!maxAmount.value || maxAmount.value.trim() === '') return showError('Please enter a maximum amount.');
    const minAmt = parseFloat(minAmount.value);
    const maxAmt = parseFloat(maxAmount.value);
    if (isNaN(minAmt) || isNaN(maxAmt)) return showError('Min and max amounts must be valid numbers.');
    if (minAmt > maxAmt) return showError('Minimum amount cannot be greater than maximum amount.');
    if (specificBankInRange.checked && !bankNameInRange.value) return showError('Please select a bank.');

    bankInRangeLoadingIndicator.classList.remove("hidden");
    printInRangeBtn.disabled = true;

    const format = document.querySelector('input[name="bankFormatInRange"]:checked').value;
    const month = processingMonthInRange.value;
    const year = processingYearInRange.value;
    const summary = document.getElementById("summaryReportInRange").checked;

    try {
      const token = localStorage.getItem('token');
      const params = new URLSearchParams({ format, month, year, summaryOnly: summary ? 'true' : 'false', minAmount: minAmt.toString(), maxAmount: maxAmt.toString() });
      if (specificBankInRange.checked && bankNameInRange.value) params.append('bankName', bankNameInRange.value);
      if (allClassesInRangeCheck.checked) { params.append('allClasses', 'true'); if (specificClassInRangeSelect.value) params.append('specificClass', specificClassInRangeSelect.value); }

      const response = await auth.fetchWithAuth(`${API_BASE_IN_RANGE}/generate?${params.toString()}`, { method: 'GET', headers: { 'Authorization': `Bearer ${token}` } });
      if (!response.ok) { const e = await response.json(); throw new Error(e.error || 'Failed to generate in-range report'); }

      const blob = await response.blob();
      bankInRangeLoadingIndicator.classList.add("hidden");
      printInRangeBtn.disabled = false;

      const filename = `payments_by_bank_in_range_${minAmt}_to_${maxAmt}_${month}_${year}.${format === 'pdf' ? 'pdf' : 'xlsx'}`;
      window.rangeCurrentBlob = blob;
      window.rangeCurrentFormat = format;
      window.rangeCurrentFilename = filename;

      const iframe = document.getElementById('rangePreviewIframe');
      const dlBtn = document.getElementById('rangeDownloadPreviewBtn');
      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.rangeCurrentBlobUrl = blobUrl;
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg><p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p><p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p></div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }
      document.getElementById('rangePreviewModal').classList.remove('hidden');
    } catch (error) {
      bankInRangeLoadingIndicator.classList.add("hidden");
      printInRangeBtn.disabled = false;
      showError(error.message || 'Failed to generate report. Please try again.');
    }
  });

  document.getElementById("clearPrintInRangeBtn").addEventListener("click", () => {
    allBanksInRange.checked = true;
    toggleBankInputInRange();
    processingYearInRange.value = new Date().getFullYear();
    minAmount.value = '';
    maxAmount.value = '';
    allClassesInRangeCheck.checked = false;
    toggleSpecificClassSelectInRange();
  });

  toggleBankInputInRange();
  toggleSpecificClassSelectInRange();
  loadBanksInRange();
  loadPayrollClassesInRange();
</script>
