<div class="p-4">
  <div class="mb-4 flex items-center justify-between gap-3">
    <p class="text-sm text-blue-900/50">
      Forms submitted by personnel awaiting your authentication
    </p>
  </div>

  <div class="relative mb-4">
    <i
      class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-navy/30 text-sm"
    ></i>
    <input
      type="text"
      id="doPendingSearch"
      placeholder="Search by name or service number..."
      class="w-full pl-9 pr-3 py-2 border border-amber-100 rounded-lg text-sm text-navy bg-white focus:outline-none focus:border-navy"
    />
  </div>

  <div id="do-pending-content">
    <div class="flex items-center justify-center py-12 text-navy/30">
      <i class="fas fa-spinner fa-spin mr-2"></i>
    </div>
  </div>
</div>

<!-- Review Modal (unchanged) -->
<div
  id="doReviewModal"
  class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
>
  <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl">
    <h3 class="font-black text-navy text-base mb-1 uppercase tracking-wide">
      Review Form
    </h3>
    <p class="text-sm text-blue-900/40 mb-4" id="reviewModalMeta"></p>
    <div class="mb-4">
      <label
        class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-2"
        >Remarks (optional)</label
      >
      <textarea
        id="doReviewRemarks"
        rows="3"
        placeholder="Add remarks for the personnel or FO..."
        class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white focus:outline-none focus:border-navy resize-none"
      ></textarea>
    </div>
    <div class="flex gap-3">
      <button
        onclick="doReviewAction('reject')"
        class="flex-1 py-2.5 bg-red-500 text-white font-bold text-sm rounded-lg hover:bg-red-600 transition-colors cursor-pointer border-none"
      >
        <i class="fas fa-times mr-1"></i>Reject
      </button>
      <button
        onclick="doReviewAction('review')"
        class="flex-1 py-2.5 bg-green-600 text-white font-bold text-sm rounded-lg hover:bg-green-700 transition-colors cursor-pointer border-none"
      >
        <i class="fas fa-check mr-1"></i>Authenticate
      </button>
    </div>
    <button
      onclick="closeDoModal()"
      class="mt-3 w-full text-sm text-center text-gray-400 py-1 cursor-pointer border-none bg-none"
    >
      Cancel
    </button>
    <div
      id="doReviewMsg"
      class="hidden mt-3 p-3 rounded-lg text-sm font-semibold"
    ></div>
  </div>
</div>

<script>
  var doActiveFormId = null;
  var doPendingCurrentPage = 1;
  var doPendingCurrentSearch = "";

  function debounce(fn, delay) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }

  /* ── fetch page from BE and render ── */
  function loadDoPending(page, search) {
    page = page || 1;
    search = search !== undefined ? search : doPendingCurrentSearch;
    doPendingCurrentPage = page;
    doPendingCurrentSearch = search;

    const el = document.getElementById("do-pending-content");
    el.innerHTML = `<div class="flex items-center justify-center py-12 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>`;

    const qs = new URLSearchParams({
      page,
      limit: DO_REVIEWED_PAGE_SIZE,
      search: search || "",
    });

    fetch(
      "/do/ship/" + encodeURIComponent(ship) + "/personnel?" + qs.toString(),
      {
        headers: { Authorization: "Bearer " + token },
      },
    )
      .then((r) => (r.ok ? r.json() : { forms: [], total: 0 }))
      .then((res) => {
        const rows = Array.isArray(res) ? res : res.forms || [];
        const total = Array.isArray(res) ? 1 : res.total || 1;

        if (!rows.length && page === 1) {
          el.innerHTML = search
            ? `<div class="text-center py-16 text-blue-900/30">
                 <i class="fas fa-search fa-2x mb-3 block"></i>
                 <p class="font-semibold">No matches for "${search}"</p>
               </div>`
            : `<div class="text-center py-16 text-blue-900/30">
                 <i class="fas fa-check-circle fa-2x mb-3 block text-green-300"></i>
                 <p class="font-semibold">No forms pending review</p>
                 <p class="text-sm mt-1">All submitted forms have been reviewed.</p>
               </div>`;
          return;
        }

        el.innerHTML = `
        <div class="bg-white/60 rounded-xl border border-amber-100 shadow overflow-hidden overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="text-left text-xs font-bold text-navy/60 uppercase tracking-wide border-b border-amber-100">
                <th class="py-3 px-4">Name</th>
                <th class="py-3 px-4">Service No.</th>
                <th class="py-3 px-4">Submitted</th>
                <th class="py-3 px-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (r) => `
                <tr class="border-b border-amber-50 last:border-0 hover:bg-amber-50/40 transition-colors">
                  <td class="py-3 px-4 font-bold text-navy">${r.Surname || ""} ${r.OtherName || ""}</td>
                  <td class="py-3 px-4 text-blue-900/50">${r.serviceNumber}</td>
                  <td class="py-3 px-4 text-blue-900/50">
                    ${
                      r.submitted_at
                        ? new Date(r.submitted_at).toLocaleDateString("en-GB", {
                            day: "2-digit",
                            month: "short",
                          })
                        : new Date(r.datecreated).toLocaleDateString("en-GB", {
                            day: "2-digit",
                            month: "short",
                          })
                    }
                  </td>
                  <td class="py-3 px-4">
                    <div class="flex gap-2 justify-end">
                      <button onclick="viewForm('${r.serviceNumber}', 'EMOL_DO')" class="px-2 py-1.5 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg cursor-pointer border border-blue-200 hover:bg-blue-100 transition-colors">
                        <i class="fas fa-eye mr-1"></i>View
                      </button>
                      <button onclick="openDoReview('${r.formId}','${r.Surname} (${r.serviceNumber})')" class="px-3 py-1.5 bg-navy text-white text-xs font-bold rounded-lg cursor-pointer border-none hover:bg-blue-800 transition-colors">
                        Review
                      </button>
                    </div>
                  </td>
                </tr>`,
                )
                .join("")}
            </tbody>
          </table>
        </div>
        ${paginatorHTML(page, Math.ceil(total / DO_REVIEWED_PAGE_SIZE), "doPending")}`;

        el.querySelectorAll('[data-paginator="doPending"]').forEach((btn) => {
          btn.addEventListener("click", () => loadDoPending(+btn.dataset.page));
        });
      })
      .catch(() => {
        el.innerHTML =
          '<div class="text-center py-10 text-red-400 text-sm">Failed to load</div>';
      });
  }

  const debouncedDoPendingSearch = debounce(
    (val) => loadDoPending(1, val),
    350,
  );
  document.getElementById("doPendingSearch").addEventListener("input", (e) => {
    debouncedDoPendingSearch(e.target.value.trim());
  });

  function openDoReview(formId, meta) {
    doActiveFormId = formId;
    document.getElementById("reviewModalMeta").textContent = meta;
    document.getElementById("doReviewRemarks").value = "";
    document.getElementById("doReviewMsg").classList.add("hidden");
    document.getElementById("doReviewModal").classList.remove("hidden");
  }

  function closeDoModal() {
    document.getElementById("doReviewModal").classList.add("hidden");
    doActiveFormId = null;
  }

  function doReviewAction(action) {
    const remarks = document.getElementById("doReviewRemarks").value.trim();
    const msg = document.getElementById("doReviewMsg");
    fetch("/do/forms/" + doActiveFormId + "/" + action, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token,
      },
      body: JSON.stringify({ form_id: doActiveFormId, ship, remarks }),
    })
      .then((r) => r.json().then((d) => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold " +
          (ok ? "bg-green-50 text-green-700" : "bg-red-50 text-red-600");
        msg.textContent = ok
          ? d.message ||
            (action === "approve" ? "Form authenticated." : "Form rejected.")
          : d.error || "Failed";
        msg.classList.remove("hidden");
        if (ok) {
          setTimeout(() => {
            closeDoModal();
            loadDoPending(doPendingCurrentPage, doPendingCurrentSearch);
          }, 1200);
        }
      })
      .catch(() => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600";
        msg.textContent = "Server error";
        msg.classList.remove("hidden");
      });
  }

  function viewForm(svcno, role) {
    sessionStorage.setItem("emolument_form_return_page", "ship-dashboard");
    sessionStorage.setItem("active_ship_role", role);
    sessionStorage.setItem("emolument_form_svcno", svcno);
    window.location.href =
      "../../pages/emolument-form.html?svcno=" +
      encodeURIComponent(svcno) +
      "&role=" +
      encodeURIComponent(role) +
      "&admin=1" +
      "&ship=" +
      encodeURIComponent(ship);
  }

  loadDoPending(1, "");
</script>
