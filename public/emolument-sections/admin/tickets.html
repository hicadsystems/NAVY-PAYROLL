<!-- FILE: emolument-sections/admin/tickets.html
     Endpoints: GET /tickets/counts   GET /tickets   POST /tickets/:id/respond   PATCH /tickets/:id/close -->

<style>
  /* ── Stat cards ── */
  .atk-stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.5rem;
    margin-bottom: 1.25rem;
  }

  @media (max-width: 540px) {
    .atk-stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  .atk-stat {
    background: white;
    border: 1px solid rgba(251, 191, 36, 0.25);
    border-radius: 0.75rem;
    padding: 0.85rem 0.75rem;
  }

  .atk-stat-lbl {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(30, 64, 175, 0.38);
    margin-bottom: 0.3rem;
  }

  .atk-stat-val {
    font-size: 1.45rem;
    font-weight: 900;
    color: rgb(30 64 175);
    line-height: 1;
  }

  /* ── Status badges ── */
  .atk-badge {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .atk-open {
    background: rgba(245, 158, 11, 0.12);
    color: #92400e;
  }

  .atk-responded {
    background: rgba(34, 197, 94, 0.12);
    color: #166534;
  }

  .atk-closed {
    background: rgba(100, 116, 139, 0.12);
    color: #475569;
  }

  /* ── Filter tabs ── */
  .atk-tab-row {
    display: flex;
    gap: 0.35rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }

  .atk-tab {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.3rem 0.85rem;
    border-radius: 999px;
    border: 1px solid rgba(251, 191, 36, 0.3);
    background: transparent;
    color: rgba(30, 64, 175, 0.45);
    cursor: pointer;
    transition: all 0.15s;
  }

  .atk-tab:hover {
    background: rgba(251, 191, 36, 0.08);
  }

  .atk-tab.active {
    background: rgb(30 64 175);
    color: white;
    border-color: rgb(30 64 175);
  }

  /* ── Table ── */
  .atk-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  .atk-table thead tr {
    border-bottom: 2px solid rgba(251, 191, 36, 0.2);
  }

  .atk-table th {
    text-align: left;
    padding: 0.5rem;
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: rgba(30, 64, 175, 0.45);
    white-space: nowrap;
  }

  .atk-table td {
    padding: 0.55rem 0.5rem;
    border-bottom: 1px solid rgba(251, 191, 36, 0.1);
    vertical-align: middle;
    color: rgba(30, 64, 175, 0.7);
  }

  .atk-table tbody tr:hover {
    background: rgba(251, 191, 36, 0.04);
  }

  .atk-table tbody tr:last-child td {
    border-bottom: none;
  }

  .atk-name {
    font-weight: 700;
    color: rgb(30 64 175);
    white-space: nowrap;
  }

  .atk-svcno {
    font-size: 0.6rem;
    color: rgba(30, 64, 175, 0.4);
    margin-top: 1px;
  }

  .atk-clip {
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.72rem;
    color: rgba(30, 64, 175, 0.6);
  }

  .atk-clip.green {
    color: #166534;
  }

  .atk-btn {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s;
  }

  .atk-btn:hover {
    opacity: 0.8;
  }

  .atk-btn-view {
    background: rgba(30, 64, 175, 0.07);
    color: rgb(30 64 175);
    border: 1px solid rgba(30, 64, 175, 0.15) !important;
  }

  /* ── Pagination ── */
  .atk-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.75rem;
  }

  .atk-pg-btn {
    padding: 0.3rem 0.75rem;
    font-size: 0.7rem;
    font-weight: 700;
    color: rgb(30 64 175);
    border: 1px solid rgba(251, 191, 36, 0.3);
    border-radius: 0.5rem;
    background: rgba(255, 255, 255, 0.6);
    cursor: pointer;
    transition: background 0.15s;
  }

  .atk-pg-btn:hover:not(:disabled) {
    background: rgba(251, 191, 36, 0.08);
  }

  .atk-pg-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .atk-pg-info {
    font-size: 0.65rem;
    color: rgba(30, 64, 175, 0.4);
    font-weight: 600;
  }

  /* ── Skeleton / empty ── */
  .atk-sk {
    display: inline-block;
    background: rgba(251, 191, 36, 0.18);
    border-radius: 0.25rem;
    animation: atk-pulse 1.4s ease-in-out infinite;
  }

  @keyframes atk-pulse {
    0%,
    100% {
      opacity: 1;
    }

    50% {
      opacity: 0.4;
    }
  }

  .atk-empty {
    text-align: center;
    padding: 2.5rem 0;
    font-size: 0.8rem;
    color: rgba(30, 64, 175, 0.3);
  }

  /* ── Modal ── */
  .atk-modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(2px);
  }

  .atk-modal {
    background: #fff;
    border-radius: 0.9rem;
    padding: 1.4rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(30, 64, 175, 0.12);
    max-height: 88vh;
    overflow-y: auto;
  }

  .atk-modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 0.5rem;
  }

  .atk-modal-title {
    font-size: 0.9rem;
    font-weight: 900;
    color: rgb(30 64 175);
    line-height: 1.3;
  }

  .atk-modal-close {
    font-size: 1.1rem;
    cursor: pointer;
    color: rgba(30, 64, 175, 0.35);
    background: none;
    border: none;
    line-height: 1;
    flex-shrink: 0;
    padding: 0;
  }

  .atk-modal-close:hover {
    color: rgb(30 64 175);
  }

  .atk-modal-meta {
    font-size: 0.65rem;
    color: rgba(30, 64, 175, 0.45);
    margin-bottom: 0.85rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    padding: 0.5rem 0.65rem;
    background: rgba(30, 64, 175, 0.03);
    border: 1px solid rgba(251, 191, 36, 0.15);
    border-radius: 0.4rem;
  }

  .atk-modal-meta span {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .atk-field-lbl {
    font-size: 0.62rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: rgba(30, 64, 175, 0.4);
    margin-bottom: 0.25rem;
    margin-top: 0.75rem;
    display: block;
  }

  .atk-field-lbl:first-of-type {
    margin-top: 0;
  }

  .atk-modal-body-text {
    font-size: 0.78rem;
    color: rgba(30, 64, 175, 0.75);
    line-height: 1.6;
    background: rgba(30, 64, 175, 0.03);
    border: 1px solid rgba(251, 191, 36, 0.2);
    border-radius: 0.5rem;
    padding: 0.65rem 0.75rem;
    white-space: pre-wrap;
  }

  .atk-prev-resp {
    background: rgba(34, 197, 94, 0.06);
    border: 1px solid rgba(34, 197, 94, 0.2);
    border-radius: 0.5rem;
    padding: 0.6rem 0.75rem;
  }

  .atk-prev-resp-lbl {
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #166534;
    margin-bottom: 0.25rem;
  }

  .atk-prev-resp-text {
    font-size: 0.75rem;
    color: #166534;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .atk-prev-resp-by {
    font-size: 0.6rem;
    color: rgba(22, 101, 52, 0.6);
    margin-top: 0.25rem;
  }

  .atk-textarea {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(251, 191, 36, 0.4);
    border-radius: 0.5rem;
    padding: 0.6rem 0.75rem;
    font-size: 0.8rem;
    color: rgb(30 64 175);
    background: rgba(255, 255, 255, 0.9);
    resize: none;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
  }

  .atk-textarea:focus {
    border-color: rgb(30 64 175);
  }

  .atk-modal-footer {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  .atk-modal-msg {
    font-size: 0.72rem;
    font-weight: 600;
    padding: 0.4rem 0.6rem;
    border-radius: 0.4rem;
    margin-top: 0.5rem;
  }
</style>

<div class="p-2 md:p-4 lg:p-6">

  <!-- Stat cards -->

  id="atk-modal"

>

        >
          <i class="fas fa-paper-plane mr-1"></i>Send Response
        </button>
        <button
          onclick="atkCloseTicket()"
          id="atk-m-close-btn"
          class="py-2 px-3 bg-gray-100 text-slate-500 font-bold text-sm rounded-lg hover:bg-gray-200 cursor-pointer border border-gray-200 transition-colors"

    <!-- Closed note -->
    <div
      id="atk-m-closed-note"
      style="display: none"
      class="text-center text-xs text-slate-400 font-semibold mt-3 py-2 border-t border-gray-100"

      This ticket is closed. No further action required.

<script>
  (function () {
    var TOKEN = localStorage.getItem("token");
    var PAGE_SIZE = 10;
    var _status = "all";
    var _page = 1;
    var _search = "";
    var _debounce = null;
    var _activeId = null;

    // ── Ticket store — avoids passing data through HTML attributes entirely ──
    // This is the root cause of "Unexpected end of input": JSON.stringify
    // inside an onclick="" attribute breaks if ANY field contains a quote,
    // apostrophe, angle bracket, or newline.
    var _ticketStore = {}; // id → ticket object

    /* ── Helpers ── */
    function N(v) {
      return !v && v !== 0 ? "0" : Number(v).toLocaleString();
    }

    function esc(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function fmtDate(d) {
      if (!d) return "—";
      return new Date(d).toLocaleDateString("en-GB", {
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    /* ── Load counts ── */
    function loadCounts() {
      fetch("/tickets/counts", {
        headers: { Authorization: "Bearer " + TOKEN },
      })
        .then(function (r) {
          return r.ok ? r.json() : null;
        })
        .then(function (d) {
          if (!d) return;
          document.getElementById("atk-s-total").textContent = N(d.total);
          document.getElementById("atk-s-open").textContent = N(d.open);
          document.getElementById("atk-s-responded").textContent = N(
            d.responded,
          );
          document.getElementById("atk-s-closed").textContent = N(d.closed);
        })
        .catch(function () {});
    }

    /* ── Load tickets ── */
    function loadTickets() {
      var wrap = document.getElementById("atk-table-wrap");
      wrap.innerHTML =
        '<div class="atk-empty"><i class="fas fa-spinner fa-spin mr-2"></i></div>';

      var params = new URLSearchParams({ page: _page, pageSize: PAGE_SIZE });
      if (_status && _status !== "all") params.set("status", _status);
      if (_search) params.set("search", _search);

      fetch("/tickets?" + params, {
        headers: { Authorization: "Bearer " + TOKEN },
      })
        .then(function (r) {
          return r.ok ? r.json() : Promise.reject(r.status);
        })
        .then(function (data) {
          var rows = data.rows || [];
          var pagination = data.pagination || {};

          // Populate store — keyed by ticket id
          _ticketStore = {};
          rows.forEach(function (t) {
            _ticketStore[t.id] = t;
          });

          renderTable(rows);
          renderPagination(pagination);

          var countEl = document.getElementById("atk-count");
          if (countEl) countEl.textContent = N(pagination.total) + " ticket(s)";
        })
        .catch(function () {
          wrap.innerHTML =
            '<div class="atk-empty" style="color:#f87171;">Failed to load tickets.</div>';
        });
    }

    /* ── Render table (slim: svc no, ship, subject, message, response, status, action) ── */
    function renderTable(rows) {
      var wrap = document.getElementById("atk-table-wrap");
      if (!rows.length) {
        wrap.innerHTML = '<div class="atk-empty">No tickets found.</div>';
        return;
      }

      var html =
        '<table class="atk-table">' +
        "<thead><tr>" +
        "<th>Svc. No.</th>" +
        "<th>Ship</th>" +
        "<th>Subject</th>" +
        "<th>Message</th>" +
        "<th>Response</th>" +
        "<th>Status</th>" +
        "<th></th>" +
        "</tr></thead><tbody>";

      rows.forEach(function (t) {
        var badgeCls =
          t.status === "responded"
            ? "atk-responded"
            : t.status === "closed"
              ? "atk-closed"
              : "atk-open";

        // Safe: id is always a plain integer — no escaping hazard
        html +=
          "<tr>" +
          "<td>" +
          '<div class="atk-name">' +
          esc(t.user_id) +
          "</div>" +
          "</td>" +
          '<td style="font-size:0.7rem;white-space:nowrap;">' +
          esc(t.ship || "—") +
          "</td>" +
          '<td style="font-size:0.7rem;font-weight:600;color:rgb(30 64 175);white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;">' +
          esc(t.subject) +
          "</td>" +
          '<td><div class="atk-clip">' +
          esc(t.body) +
          "</div></td>" +
          '<td><div class="atk-clip' +
          (t.response ? " green" : "") +
          '">' +
          (t.response
            ? esc(t.response)
            : '<span style="color:rgba(30,64,175,0.2);font-size:0.65rem;">—</span>') +
          "</div></td>" +
          '<td><span class="atk-badge ' +
          badgeCls +
          '">' +
          t.status +
          "</span></td>" +
          "<td>" +
          '<button class="atk-btn atk-btn-view" onclick="atkOpenModal(' +
          t.id +
          ')">' +
          '<i class="fas fa-eye mr-1"></i>View' +
          "</button>" +
          "</td>" +
          "</tr>";
      });

      html += "</tbody></table>";
      wrap.innerHTML = html;
    }

    /* ── Pagination ── */
    function renderPagination(p) {
      var el = document.getElementById("atk-pagination");
      var info = document.getElementById("atk-pg-info");
      var prev = document.getElementById("atk-prev");
      var next = document.getElementById("atk-next");
      if (!el) return;
      if (p.totalPages > 1) {
        el.classList.remove("hidden");
        if (info) info.textContent = "Page " + p.page + " of " + p.totalPages;
        if (prev) prev.disabled = p.page <= 1;
        if (next) next.disabled = p.page >= p.totalPages;
      } else {
        el.classList.add("hidden");
      }
    }

    window.atkChangePage = function (dir) {
      _page = Math.max(1, _page + dir);
      loadTickets();
    };

    /* ── Status tabs ── */
    window.atkSetStatus = function (status) {
      _status = status;
      _page = 1;
      document.querySelectorAll(".atk-tab").forEach(function (t) {
        t.classList.toggle("active", t.dataset.status === status);
      });
      loadTickets();
    };

    /* ── Search ── */
    window.atkSearchDebounce = function () {
      clearTimeout(_debounce);
      _debounce = setTimeout(function () {
        _search = document.getElementById("atk-search").value.trim();
        _page = 1;
        loadTickets();
      }, 350);
    };

    window.atkClearSearch = function () {
      document.getElementById("atk-search").value = "";
      _search = "";
      _page = 1;
      loadTickets();
    };

    /* ── Modal — opened with the ticket's integer id, data read from _ticketStore ── */
    window.atkOpenModal = function (id) {
      var t = _ticketStore[id];
      if (!t) return;
      _activeId = t.id;

      var badgeCls =
        t.status === "responded"
          ? "atk-responded"
          : t.status === "closed"
            ? "atk-closed"
            : "atk-open";

      document.getElementById("atk-m-subject").textContent = t.subject || "—";
      document.getElementById("atk-m-badge").innerHTML =
        '<span class="atk-badge ' + badgeCls + '">' + t.status + "</span>";

      // Meta strip — all values go through textContent / esc, never innerHTML with raw data
      var meta = document.getElementById("atk-m-meta");
      meta.innerHTML = "";
      [
        ["fa-id-badge", (t.full_name || "—") + " · " + (t.user_id || "—")],
        ["fa-ship", t.ship || "—"],
        ["fa-envelope", t.email || null],
        ["fa-phone", t.phone || null],
        ["fa-clock", fmtDate(t.created_at)],
      ].forEach(function (pair) {
        if (pair[1] === null) return;
        var span = document.createElement("span");
        var icon = document.createElement("i");
        icon.className = "fas " + pair[0];
        icon.style.fontSize = "10px";
        span.appendChild(icon);
        span.appendChild(document.createTextNode(" " + pair[1]));
        meta.appendChild(span);
      });

      // Original message — textContent is XSS-safe, preserves newlines via pre-wrap
      document.getElementById("atk-m-body").textContent = t.body || "—";

      // Previous response
      var prevEl = document.getElementById("atk-m-prev-resp");
      if (t.response) {
        document.getElementById("atk-m-prev-text").textContent = t.response;
        document.getElementById("atk-m-prev-by").textContent =
          "— " + (t.responded_by || "Admin") + " · " + fmtDate(t.responded_at);
        prevEl.style.display = "block";
      } else {
        prevEl.style.display = "none";
      }

      // Reply vs closed
      var replyArea = document.getElementById("atk-m-reply-area");
      var closedNote = document.getElementById("atk-m-closed-note");
      document.getElementById("atk-m-reply").value = "";
      document.getElementById("atk-m-msg").style.display = "none";

      if (t.status === "closed") {
        replyArea.style.display = "none";
        closedNote.style.display = "block";
      } else {
        replyArea.style.display = "block";
        closedNote.style.display = "none";
      }

      document.getElementById("atk-modal").style.display = "flex";
    };

    window.atkCloseModal = function () {
      document.getElementById("atk-modal").style.display = "none";
      _activeId = null;
    };

    /* ── Send response ── */
    window.atkSendResponse = function () {
      if (!_activeId) return;
      var reply = document.getElementById("atk-m-reply").value.trim();
      var msgEl = document.getElementById("atk-m-msg");
      var sendBtn = document.getElementById("atk-m-send-btn");

      function showMsg(text, ok) {
        msgEl.style.display = "block";
        msgEl.style.background = ok
          ? "rgba(34,197,94,0.08)"
          : "rgba(248,113,113,0.12)";
        msgEl.style.color = ok ? "#166534" : "#dc2626";
        msgEl.textContent = text;
      }

      if (!reply) {
        showMsg("Please type a response before sending.", false);
        return;
      }

      sendBtn.disabled = true;
      sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>Sending…';

      fetch("/tickets/" + _activeId + "/respond", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + TOKEN,
        },
        body: JSON.stringify({ response: reply }),
      })
        .then(function (r) {
          return r.json().then(function (d) {
            return { ok: r.ok, d: d };
          });
        })
        .then(function (res) {
          if (res.ok) {
            showMsg("Response sent successfully.", true);
            setTimeout(function () {
              atkCloseModal();
              loadTickets();
              loadCounts();
            }, 900);
          } else {
            showMsg(res.d.error || "Failed to send response.", false);
          }
        })
        .catch(function () {
          showMsg("Server error. Please try again.", false);
        })
        .finally(function () {
          sendBtn.disabled = false;
          sendBtn.innerHTML =
            '<i class="fas fa-paper-plane mr-1"></i>Send Response';
        });
    };

    /* ── Close ticket ── */
    window.atkCloseTicket = function () {
      if (!_activeId) return;
      if (
        !confirm(
          "Mark this ticket as closed? The user will see it as resolved.",
        )
      )
        return;

      fetch("/tickets/" + _activeId + "/close", {
        method: "PATCH",
        headers: { Authorization: "Bearer " + TOKEN },
      })
        .then(function (r) {
          return r.ok;
        })
        .then(function (ok) {
          if (ok) {
            atkCloseModal();
            loadTickets();
            loadCounts();
          }
        })
        .catch(function () {});
    };

    /* ── Init ── */
    loadCounts();
    loadTickets();

    // Hoist modal to body on load so overlay covers full viewport
    const modal = document.getElementById("atk-modal");
    document.body.appendChild(modal);
  })();
</script>
