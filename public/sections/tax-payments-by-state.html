<style>
  @keyframes grow-up {
    0% { height: 0; bottom: 0; }
    100% { height: 100%; bottom: 0; }
  }
  @keyframes grow-down {
    0% { height: 0; top: 0; }
    100% { height: 100%; top: 0; }
  }
  @keyframes expand {
    0% { width: 0; left: 50%; transform: translate(-50%, -50%); }
    100% { width: 100%; left: 0; transform: translateY(-50%); }
  }
  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }
  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }
  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<!-- Tax Payments By State -->
<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Print Tax Payments By State Reports</h2>

  <form id="taxStateForm" class="space-y-4">
    <!-- State Selection -->
    <div>
      <label class="block font-medium mb-2">Select State</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" id="allStates" name="stateChoice" value="all" checked>
          <span>All States</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" id="specificState" name="stateChoice" value="specific">
          <span>Specific State</span>
        </label>
      </div>
      <select id="stateDropdown"
        class="mt-2 w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent" disabled>
        <option value="">Select State</option>
      </select>
    </div>

    <!-- Processing Month -->
    <div>
      <label for="taxMonth" class="block text-sm font-medium mb-1">Processing Month</label>
      <select id="taxMonth"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <option value="">Select Month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
      </select>
    </div>

    <!-- Output Format -->
    <div class="flex flex-wrap items-center gap-2">
      <label class="block font-medium">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="taxFormat" value="pdf" checked>
          <span>PDF</span>
        </label>
        <label class="hidden flex text-sm items-center space-x-2">
          <input type="radio" name="taxFormat" value="excel">
          <span>Excel</span>
        </label>
      </div>
    </div>

    <div class="flex justify-between items-center gap-2 mb-4">
      <!-- Summary Report -->
      <div class="flex items-center space-x-2">
        <input type="checkbox" id="taxSummary" class="h-4 w-4">
        <label for="taxSummary" class="text-sm">Summary Report</label>
      </div>

      <!-- Buttons -->
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="taxClearBtn"
          class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="taxPrintBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
  </form>
</section>

<!-- Confirm -->
<div id="taxConfirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue with report generation?</p>
    <div class="flex justify-end gap-2">
      <button id="taxCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="taxContinueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Processing -->
<div id="taxProcessingModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mb-2 mx-auto">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2"></div>
    </div>
    <p class="text-gray-700">Generating report...</p>
  </div>
</div>

<!-- Success -->
<div id="taxSuccessModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="taxSuccessMessage">Report generated successfully!</p>
    <button id="taxPrintNowBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">OK</button>
  </div>
</div>

<!-- Error -->
<div id="taxErrorModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p id="taxErrorText" class="mb-6 text-gray-700">Please complete required fields.</p>
    <button id="taxErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal -->
<div id="taxPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">Tax Payments By State Preview</h3>
      <button id="taxClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>

    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="taxPreviewIframe" title="Tax Payments By State Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;">
      </iframe>
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="taxCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="taxDownloadPreviewBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/taxstatepay';

  const allStates = document.getElementById('allStates');
  const specificState = document.getElementById('specificState');
  const stateDropdown = document.getElementById('stateDropdown');
  const taxMonth = document.getElementById('taxMonth');
  const taxPrintBtn = document.getElementById('taxPrintBtn');
  const taxClearBtn = document.getElementById('taxClearBtn');

  const taxConfirmModal = document.getElementById('taxConfirmModal');
  const taxCancelBtn = document.getElementById('taxCancelBtn');
  const taxContinueBtn = document.getElementById('taxContinueBtn');

  const taxProcessingModal = document.getElementById('taxProcessingModal');
  const taxSuccessModal = document.getElementById('taxSuccessModal');
  const taxPrintNowBtn = document.getElementById('taxPrintNowBtn');
  const taxSuccessMessage = document.getElementById('taxSuccessMessage');

  const taxErrorModal = document.getElementById('taxErrorModal');
  const taxErrorOkBtn = document.getElementById('taxErrorOkBtn');
  const taxErrorText = document.getElementById('taxErrorText');

  // ── Helpers ─────────────────────────────────────────────────────
  function getMonthNumber(monthName) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months.indexOf(monthName) + 1;
  }

  function getMonthName(monthNum) {
    const months = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    return months[monthNum - 1] || '';
  }

  // ── Load states ─────────────────────────────────────────────────
  async function loadTaxStates() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.taxStates) {
          stateDropdown.innerHTML = '<option value="">Select State</option>';
          result.data.taxStates.forEach(state => {
            const option = document.createElement('option');
            option.value = state.state_code;
            option.textContent = state.state_name;
            stateDropdown.appendChild(option);
          });
        }
      }
    } catch (error) {
      console.error('Error loading tax states:', error);
    }
  }

  // ── Load current period ─────────────────────────────────────────
  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`${API_BASE}/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data.currentPeriod) {
          taxMonth.value = getMonthName(result.data.currentPeriod.month);
        }
      }
    } catch (error) {
      console.error('Error loading current period:', error);
    }
  }

  // ── Toggles ─────────────────────────────────────────────────────
  function toggleStateSelect() {
    stateDropdown.disabled = allStates.checked;
    if (allStates.checked) stateDropdown.value = '';
  }

  allStates.addEventListener('change', toggleStateSelect);
  specificState.addEventListener('change', toggleStateSelect);

  // ── Validate & show confirm ─────────────────────────────────────
  taxPrintBtn.addEventListener('click', () => {
    if (!taxMonth.value) {
      taxErrorText.textContent = 'Please select a processing month.';
      taxErrorModal.classList.remove('hidden'); return;
    }
    if (specificState.checked && !stateDropdown.value) {
      taxErrorText.textContent = 'Please choose a state when "Specific State" is selected.';
      taxErrorModal.classList.remove('hidden'); return;
    }
    taxConfirmModal.classList.remove('hidden');
  });

  taxCancelBtn.addEventListener('click', () => taxConfirmModal.classList.add('hidden'));

  // ── Generate — fetch blob, show in preview iframe ───────────────
  taxContinueBtn.addEventListener('click', async () => {
    taxConfirmModal.classList.add('hidden');
    taxProcessingModal.classList.remove('hidden');
    taxPrintBtn.disabled = true;

    const format = document.querySelector('input[name="taxFormat"]:checked').value;
    const summary = document.getElementById('taxSummary').checked;
    const monthNum = getMonthNumber(taxMonth.value);

    try {
      const token = localStorage.getItem('token');

      const params = new URLSearchParams({
        format,
        month: monthNum,
        summaryOnly: summary ? 'true' : 'false'
      });

      if (specificState.checked && stateDropdown.value) {
        params.append('tax_state', stateDropdown.value);
      }

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();

      taxProcessingModal.classList.add('hidden');
      taxPrintBtn.disabled = false;

      // Store blob for download — no second fetch needed
      window.taxCurrentBlob = blob;
      window.taxCurrentFormat = format;
      window.taxCurrentMonth = taxMonth.value;
      window.taxCurrentYear = new Date().getFullYear();

      const iframe = document.getElementById('taxPreviewIframe');
      const dlBtn = document.getElementById('taxDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.taxCurrentBlobUrl = blobUrl; // store to revoke on close
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('taxPreviewModal').classList.remove('hidden');

    } catch (error) {
      taxProcessingModal.classList.add('hidden');
      taxPrintBtn.disabled = false;
      taxErrorText.textContent = error.message || 'Failed to generate report. Please try again.';
      taxErrorModal.classList.remove('hidden');
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('taxPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('taxPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.taxCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.taxCurrentBlobUrl);
      window.taxCurrentBlobUrl = null;
    }
  }

  document.getElementById('taxClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('taxCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('taxDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.taxCurrentBlob) return;
    const fmt = window.taxCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.taxCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tax_report_${window.taxCurrentMonth}_${window.taxCurrentYear}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url); // revoke immediately after trigger

    taxSuccessMessage.textContent = 'Report downloaded successfully!';
    taxSuccessModal.classList.remove('hidden');
  });

  // ── Success OK — reset form ─────────────────────────────────────
  taxPrintNowBtn.addEventListener('click', () => {
    taxSuccessModal.classList.add('hidden');
    document.getElementById('taxStateForm').reset();
    allStates.checked = true;
    toggleStateSelect();
    loadCurrentPeriod();
  });

  taxErrorOkBtn.addEventListener('click', () => taxErrorModal.classList.add('hidden'));

  taxClearBtn.addEventListener('click', () => {
    setTimeout(() => {
      allStates.checked = true;
      toggleStateSelect();
      taxMonth.value = '';
      loadCurrentPeriod();
    }, 0);
  });

  // ── Init ────────────────────────────────────────────────────────
  toggleStateSelect();
  loadTaxStates();
  loadCurrentPeriod();
</script>
