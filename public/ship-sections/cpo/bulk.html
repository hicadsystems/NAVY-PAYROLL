<div class="p-4">
  <div class="mb-6">
    <p class="text-sm text-blue-900/50 mt-1">
      Confirm all eligible FO-approved forms at once
    </p>
  </div>

  <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-5 mb-4">
    <div class="flex items-center justify-between gap-3 mb-4">
      <h3
        class="font-bold text-navy text-sm uppercase tracking-wide whitespace-nowrap"
      >
        FO-approved Forms
      </h3>
      <div class="flex items-center gap-2">
        <input
          type="checkbox"
          id="cpoBulkSelectAll"
          onchange="cpoToggleAll(this)"
          class="accent-navy w-4 h-4"
        />
        <label for="cpoBulkSelectAll" class="text-xs font-bold text-navy/60"
          >Select All</label
        >
      </div>
    </div>

    <div class="relative mb-4">
      <i
        class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-navy/30 text-sm"
      ></i>
      <input
        type="text"
        id="cpoBulkSearch"
        placeholder="Search by name or service number..."
        class="w-full pl-9 pr-3 py-2 border border-amber-100 rounded-lg text-sm text-navy bg-white focus:outline-none focus:border-navy"
      />
    </div>

    <div id="cpoBulkList">
      <div class="flex items-center justify-center py-8 text-navy/30">
        <i class="fas fa-spinner fa-spin mr-2"></i>
      </div>
    </div>
  </div>

  <button
    onclick="executeCpoBulk()"
    class="w-full py-3 bg-green-600 text-white font-bold text-sm rounded-xl hover:bg-green-700 transition-colors cursor-pointer border-none"
  >
    <i class="fas fa-check-double mr-2"></i>Confirm Selected
  </button>
  <div
    id="cpoBulkMsg"
    class="hidden mt-3 p-3 rounded-lg text-sm font-semibold"
  ></div>
</div>

<script>
  var cpoBulkForms = [];
  var cpoBulkCurrentPage = 1;
  var cpoBulkCurrentSearch = "";

  function debounce(fn, delay) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }

  function loadCpoBulkList(page, search) {
    page = page || 1;
    search = search !== undefined ? search : cpoBulkCurrentSearch;
    cpoBulkCurrentPage = page;
    cpoBulkCurrentSearch = search;

    const el = document.getElementById("cpoBulkList");
    el.innerHTML = `<div class="flex items-center justify-center py-8 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>`;

    const qs = new URLSearchParams({
      page,
      limit: CPO_CONFIRMED_PAGE_SIZE,
      search: search || "",
    });

    fetch("/cpo/pending/" + encodeURIComponent(command) + "?" + qs.toString(), {
      headers: { Authorization: "Bearer " + token },
    })
      .then((r) => (r.ok ? r.json() : { forms: [], total: 0 }))
      .then((res) => {
        const rows = Array.isArray(res) ? res : res.forms || [];
        const total = Array.isArray(res) ? 1 : res.total || 1;
        cpoBulkForms = rows;

        document.getElementById("cpoBulkSelectAll").checked = false;

        if (!rows.length && page === 1) {
          el.innerHTML = search
            ? `<div class="text-center py-8 text-blue-900/30 text-sm"><i class="fas fa-search fa-2x mb-2 block"></i>No matches for "${search}"</div>`
            : '<div class="text-center py-8 text-blue-900/30 text-sm"><i class="fas fa-check-circle fa-2x mb-2 block text-green-300"></i>No forms pending CPO confirmation</div>';
          return;
        }

        el.innerHTML = `
        <div class="rounded-xl border border-amber-100 overflow-hidden overflow-x-auto">
          <table class="w-full text-sm border-collapse">
            <thead>
              <tr class="text-left text-xs font-bold text-navy/60 uppercase tracking-wide border-b border-amber-100 bg-white/40">
                <th class="py-2.5 px-4 w-10"></th>
                <th class="py-2.5 px-4">Name</th>
                <th class="py-2.5 px-4">Service No.</th>
                <th class="py-2.5 px-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              ${rows
                .map(
                  (r, i) => `
                <tr class="border-b border-amber-50 last:border-0 hover:bg-amber-50/40 transition-colors bg-white/60">
                  <td class="py-2.5 px-4">
                    <input type="checkbox" class="cpo-bulk-chk accent-navy w-4 h-4" data-idx="${i}" />
                  </td>
                  <td class="py-2.5 px-4 font-bold text-navy">${r.Surname || ""} ${r.OtherName || ""}</td>
                  <td class="py-2.5 px-4 text-blue-900/50">${r.serviceNumber}</td>
                  <td class="py-2.5 px-4">
                    <div class="flex gap-2 justify-end items-center">
                      <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-blue-50 text-blue-500">FO Approved</span>
                      <button onclick="viewForm('${r.serviceNumber}', 'EMOL_CPO')" class="px-2 py-1.5 bg-blue-50 text-blue-600 text-xs font-bold rounded-lg cursor-pointer border border-blue-200 hover:bg-blue-100 transition-colors">
                        <i class="fas fa-eye mr-1"></i>View
                      </button>
                    </div>
                  </td>
                </tr>`,
                )
                .join("")}
            </tbody>
          </table>
        </div>
        ${paginatorHTML(page, Math.ceil(total / CPO_CONFIRMED_PAGE_SIZE), "cpoPending")}`;

        el.querySelectorAll('[data-paginator="cpoPending"]').forEach((btn) => {
          btn.addEventListener("click", () =>
            loadCpoBulkList(+btn.dataset.page),
          );
        });
      })
      .catch(() => {
        el.innerHTML =
          '<div class="text-center py-6 text-red-400 text-sm">Failed to load</div>';
      });
  }

  const debouncedCpoBulkSearch = debounce(
    (val) => loadCpoBulkList(1, val),
    350,
  );
  document.getElementById("cpoBulkSearch").addEventListener("input", (e) => {
    debouncedCpoBulkSearch(e.target.value.trim());
  });

  function cpoToggleAll(cb) {
    document
      .querySelectorAll(".cpo-bulk-chk")
      .forEach((c) => (c.checked = cb.checked));
  }

  function viewForm(svcno, role) {
    sessionStorage.setItem("emolument_form_return_page", "ship-dashboard");
    sessionStorage.setItem("active_ship_role", role);
    sessionStorage.setItem("emolument_form_svcno", svcno);
    window.location.href =
      "../../pages/emolument-form.html?svcno=" +
      encodeURIComponent(svcno) +
      "&role=" +
      encodeURIComponent(role) +
      "&admin=1" +
      "&command=" +
      encodeURIComponent(command);
  }

  function executeCpoBulk() {
    const selected = [...document.querySelectorAll(".cpo-bulk-chk:checked")]
      .map((c) => cpoBulkForms[Number(c.dataset.idx)]?.form_id)
      .filter(Boolean);
    const msg = document.getElementById("cpoBulkMsg");
    if (!selected.length) {
      msg.className =
        "p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600";
      msg.textContent = "No forms selected.";
      msg.classList.remove("hidden");
      return;
    }
    if (!confirm("Confirm " + selected.length + " form(s)?")) return;
    fetch("/cpo/" + encodeURIComponent(command) + "/confirm/bulk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token,
      },
      body: JSON.stringify({ selected }),
    })
      .then((r) => r.json().then((d) => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold " +
          (ok ? "bg-green-50 text-green-700" : "bg-red-50 text-red-600");
        msg.textContent = ok
          ? d.message || selected.length + " forms approved."
          : d.error || "Failed";
        msg.classList.remove("hidden");
        setTimeout(() => {
          msg.classList.add("hidden");
          loadCpoBulkList(cpoBulkCurrentPage, cpoBulkCurrentSearch);
        }, 2000);
      })
      .catch(() => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600";
        msg.textContent = "Server error";
        msg.classList.remove("hidden");
      });
  }

  loadCpoBulkList(1, "");
</script>
