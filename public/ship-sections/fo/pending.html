<div class="p-4">
  <div class="mb-6">
    <p class="text-sm text-blue-900/50 mt-1">
      DO-reviewed forms awaiting your approval
    </p>
  </div>
  <div id="fo-pending-content">
    <div class="flex items-center justify-center py-12 text-navy/30">
      <i class="fas fa-spinner fa-spin mr-2"></i>
    </div>
  </div>
</div>

<!-- FO Approval Modal -->
<div
  id="foApproveModal"
  class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4"
>
  <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl">
    <h3 class="font-black text-navy text-base mb-1 uppercase tracking-wide">
      FO Approval
    </h3>
    <p class="text-sm text-blue-900/40 mb-4" id="foModalMeta"></p>
    <div class="mb-4">
      <label
        class="block text-xs font-bold text-navy/60 uppercase tracking-wide mb-2"
        >Remarks (optional)</label
      >
      <textarea
        id="foRemarks"
        rows="3"
        placeholder="Add remarks..."
        class="w-full border border-amber-100 rounded-lg px-3 py-2 text-sm text-navy bg-white focus:outline-none resize-none"
      ></textarea>
    </div>
    <div class="flex gap-3">
      <button
        onclick="foAction('reject')"
        class="flex-1 py-2.5 bg-red-500 text-white font-bold text-sm rounded-lg hover:bg-red-600 transition-colors cursor-pointer border-none"
      >
        <i class="fas fa-times mr-1"></i>Reject
      </button>
      <button
        onclick="foAction('approve')"
        class="flex-1 py-2.5 bg-green-600 text-white font-bold text-sm rounded-lg hover:bg-green-700 transition-colors cursor-pointer border-none"
      >
        <i class="fas fa-check mr-1"></i>Approve
      </button>
    </div>
    <button
      onclick="closeFoModal()"
      class="mt-3 w-full text-sm text-center text-gray-400 py-1 cursor-pointer border-none bg-none"
    >
      Cancel
    </button>
    <div
      id="foApproveMsg"
      class="hidden mt-3 p-3 rounded-lg text-sm font-semibold"
    ></div>
  </div>
</div>

<script>
  let foActiveFormId = null;
  let foPendingCurrentPage = 1;

  function loadFoPending(page) {
    page = page || 1;
    foPendingCurrentPage = page;
    const el = document.getElementById("fo-pending-content");
    el.innerHTML = `<div class="flex items-center justify-center py-12 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>`;
    fetch(
      "/fo/ship/" +
        encodeURIComponent(ship) +
        "/personnel?page=" +
        page +
        "&limit=" +
        FO_APPROVED_PAGE_SIZE,
      { headers: { Authorization: "Bearer " + token } },
    )
      .then((r) => (r.ok ? r.json() : { forms: [], total: 0 }))
      .then((res) => {
        const rows = Array.isArray(res) ? res : res.forms || [];
        const total = Array.isArray(res) ? 1 : res.total || 1;

        if (!rows.length && page === 1) {
          el.innerHTML =
            '<div class="text-center py-16 text-blue-900/30"><i class="fas fa-check-circle fa-2x mb-3 block text-green-300"></i><p class="font-semibold">No forms pending FO approval</p></div>';
          return;
        }
        el.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          ${rows
            .map(
              (r) => `
        <div class="bg-white/60 rounded-xl border border-amber-100 shadow p-4 flex items-center gap-4">
          <div class="w-10 h-10 rounded-lg bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-file-alt text-blue-500" style="font-size:16px"></i></div>
          <div class="flex-1 min-w-0">
            <div class="font-bold text-navy text-sm">${r.Surname || ""} ${r.OtherName || ""}</div>
            <div class="text-xs text-blue-900/40 mt-0.5">${r.serviceNumber} · DO reviewed ${r.div_off_date ? new Date(r.div_off_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) : "—"}</div>
          </div>
          <button onclick="openFoApproval('${r.form_id}','${r.Surname || ""} (${r.serviceNumber})')" class="px-3 py-1.5 bg-navy text-white text-xs font-bold rounded-lg cursor-pointer border-none hover:bg-blue-800 transition-colors flex-shrink-0">
            Approve
          </button>
        </div>`,
            )
            .join("")}
          </div>

           ${paginatorHTML(page, Math.ceil(total / FO_APPROVED_PAGE_SIZE), "foPending")}`;

        /* paginator click handlers — each click triggers a fresh BE fetch */
        el.querySelectorAll('[data-paginator="foPending"]').forEach((btn) => {
          btn.addEventListener("click", () => loadFoPending(+btn.dataset.page));
        });
      })
      .catch(() => {
        el.innerHTML =
          '<div class="text-center py-10 text-red-400 text-sm">Failed to load</div>';
      });
  }

  function openFoApproval(formId, meta) {
    foActiveFormId = formId;
    document.getElementById("foModalMeta").textContent = meta;
    document.getElementById("foRemarks").value = "";
    document.getElementById("foApproveMsg").classList.add("hidden");
    document.getElementById("foApproveModal").classList.remove("hidden");
  }

  function closeFoModal() {
    document.getElementById("foApproveModal").classList.add("hidden");
    foActiveFormId = null;
  }

  function foAction(action) {
    const remarks = document.getElementById("foRemarks").value.trim();
    const msg = document.getElementById("foApproveMsg");
    fetch("/fo/forms/" + foActiveFormId + "/" + action, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        Authorization: "Bearer " + token,
      },
      body: JSON.stringify({ form_id: foActiveFormId, ship, remarks }),
    })
      .then((r) => r.json().then((d) => ({ ok: r.ok, d })))
      .then(({ ok, d }) => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold " +
          (ok ? "bg-green-50 text-green-700" : "bg-red-50 text-red-600");
        msg.textContent = ok
          ? d.message ||
            (action === "approve" ? "Form approved." : "Form rejected.")
          : d.error || "Failed";
        msg.classList.remove("hidden");
        if (ok) {
          setTimeout(() => {
            closeFoModal();
            loadFoPending();
          }, 1200);
        }
      })
      .catch(() => {
        msg.className =
          "p-3 rounded-lg text-sm font-semibold bg-red-50 text-red-600";
        msg.textContent = "Server error";
        msg.classList.remove("hidden");
      });
  }

  loadFoPending(1);
</script>
