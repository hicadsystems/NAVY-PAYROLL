<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<!-- Print Options Section -->
<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-xl text-center border-b font-bold text-blue-600 mb-4">Print Analysis of Earnings/Deduction Report</h2>

  <form id="printForm" class="space-y-4">
    <!-- Radio selection -->
    <div>
      <label class="block font-medium mb-2">Select Type Option</label>
      <div class="flex space-x-4">
        <label class="flex items-center text-sm space-x-2">
          <input type="radio" id="allTypes" name="typeChoice" value="all" checked>
          <span>All Types</span>
        </label>
        <label class="flex items-center text-sm space-x-2">
          <input type="radio" id="specificType" name="typeChoice" value="specific">
          <span>Specific Type</span>
        </label>
      </div>
    </div>

    <!-- Payment Type Input -->
    <div>
      <label for="paymentType" class="block text-sm font-medium mb-1">Payment Type</label>
      <select id="paymentType" name="paymentType"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        disabled>
        <option value="">Select Payment Type</option>
      </select>
    </div>

    <!-- Processing Month -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div class="col-span-1">
        <label for="processingMonth" class="block text-sm font-medium mb-1">Processing Month</label>
        <select id="processingMonth" name="processingMonth"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">Select Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>

      <!-- Processing Year -->
      <div class="col-span-1">
        <label for="processingYear" class="block text-sm font-medium mb-1">Processing Year</label>
        <input type="number" id="processingYear" name="processingYear"
          class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="e.g., 2025" min="2020" max="2099">
      </div>
    </div>

    <!-- Output Format -->
    <div class="flex flex-wrap items-center gap-2">
      <label class="block font-medium">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="earningsFormat" value="pdf" checked>
          <span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="earningsFormat" value="excel">
          <span>Excel</span>
        </label>
      </div>
    </div>

    <div class="flex justify-between items-center gap-2 mb-4">
      <!-- Summary Report -->
      <div class="flex items-center space-x-2">
        <input type="checkbox" id="summaryReport" name="summaryReport" class="h-4 w-4">
        <label for="summaryReport" class="text-sm">Summary Report</label>
      </div>

      <!-- Buttons -->
      <div class="flex space-x-2 pt-2">
        <button type="reset" id="clearPrintBtn"
          class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">Clear</button>
        <button type="button" id="printBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Generate</button>
      </div>
    </div>
  </form>
</section>

<!-- Loading Indicator -->
<div id="earningsLoadingIndicator" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <span>Generating report...</span>
  </div>
</div>

<!-- Confirmation Modal -->
<div id="printConfirmModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to continue with report generation?</p>
    <div class="flex justify-end space-x-2">
      <button id="printCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="printContinueBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Continue</button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div id="printSuccessModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="earningsSuccessMessage">Report generated successfully!</p>
    <button id="printSuccessOkBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="printErrorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p class="mb-6 text-gray-700" id="earningsErrorMessage">Please complete all required fields.</p>
    <button id="printErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal -->
<div id="earningsPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">Earnings/Deductions Report Preview</h3>
      <button id="earningsClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>

    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="earningsPreviewIframe" title="Earnings/Deductions Report Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;">
      </iframe>
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="earningsCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="earningsDownloadPreviewBtn"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/ernded';
  let lookupMaps = {};

  const allTypes = document.getElementById("allTypes");
  const specificType = document.getElementById("specificType");
  const paymentType = document.getElementById("paymentType");
  const processingMonth = document.getElementById("processingMonth");
  const processingYear = document.getElementById("processingYear");
  const printBtn = document.getElementById("printBtn");
  const clearPrintBtn = document.getElementById("clearPrintBtn");
  const earningsLoadingIndicator = document.getElementById("earningsLoadingIndicator");

  const printConfirmModal = document.getElementById("printConfirmModal");
  const printCancelBtn = document.getElementById("printCancelBtn");
  const printContinueBtn = document.getElementById("printContinueBtn");

  const printSuccessModal = document.getElementById("printSuccessModal");
  const printSuccessOkBtn = document.getElementById("printSuccessOkBtn");
  const earningsSuccessMessage = document.getElementById("earningsSuccessMessage");

  const printErrorModal = document.getElementById("printErrorModal");
  const printErrorOkBtn = document.getElementById("printErrorOkBtn");
  const earningsErrorMessage = document.getElementById("earningsErrorMessage");

  // ── Load current period ─────────────────────────────────────────
  async function loadCurrentPeriod() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`/salarysummary/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const period = result.data.currentPeriod;
          processingYear.value = period.year;
          processingMonth.value = period.month;
        }
      }
    } catch (error) {
      console.error('Error loading current period:', error);
    }
  }

  // ── Load dropdowns ──────────────────────────────────────────────
  async function loadDropdown(endpoint, elementId, valueField, textField, placeholder) {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`/reference/${endpoint}`, {
        method: "GET",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` }
      });
      const data = await response.json();

      lookupMaps[endpoint] = Object.fromEntries(
        data.map(item => [item[valueField], item[textField]])
      );

      const dropdown = document.getElementById(elementId);
      if (dropdown) {
        dropdown.innerHTML = `<option value="">${placeholder}</option>`;
        data.forEach(item => {
          const option = document.createElement("option");
          option.value = item[valueField];
          option.textContent = item[textField];
          dropdown.appendChild(option);
        });
      }
      return data;
    } catch (err) {
      console.error(`Failed to load ${endpoint}:`, err);
      return [];
    }
  }

  async function loadAllDropdowns() {
    try {
      await loadDropdown("elementtype", "paymentType", "PaymentType", "elmDesc", "Select Payment Type");
    } catch (error) {
      console.error('Error loading dropdowns:', error);
    }
  }

  // ── Toggles ─────────────────────────────────────────────────────
  function toggleTypeInput() {
    paymentType.disabled = allTypes.checked;
  }

  allTypes.addEventListener("change", toggleTypeInput);
  specificType.addEventListener("change", toggleTypeInput);

  // ── Validate & show confirm ─────────────────────────────────────
  printBtn.addEventListener("click", () => {
    if (!processingMonth.value) {
      earningsErrorMessage.textContent = 'Please select a processing month.';
      printErrorModal.classList.remove("hidden"); return;
    }
    if (!processingYear.value) {
      earningsErrorMessage.textContent = 'Please enter a processing year.';
      printErrorModal.classList.remove("hidden"); return;
    }
    if (specificType.checked && !paymentType.value) {
      earningsErrorMessage.textContent = 'Please select a payment type.';
      printErrorModal.classList.remove("hidden"); return;
    }
    printConfirmModal.classList.remove("hidden");
  });

  printCancelBtn.addEventListener("click", () => printConfirmModal.classList.add("hidden"));

  // ── Generate — fetch blob, show in preview iframe ───────────────
  printContinueBtn.addEventListener("click", async () => {
    printConfirmModal.classList.add("hidden");
    earningsLoadingIndicator.classList.remove("hidden");
    printBtn.disabled = true;

    const format = document.querySelector('input[name="earningsFormat"]:checked').value;
    const month = processingMonth.value;
    const year = processingYear.value;
    const summary = document.getElementById("summaryReport").checked;

    try {
      const token = localStorage.getItem('token');

      const params = new URLSearchParams({
        format, month, year,
        summary: summary ? '1' : '0'
      });

      if (specificType.checked && paymentType.value) {
        params.append('payment_type', paymentType.value);
      }

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();

      earningsLoadingIndicator.classList.add("hidden");
      printBtn.disabled = false;

      // Store blob for download — no second fetch needed
      window.earningsCurrentBlob = blob;
      window.earningsCurrentFormat = format;
      window.earningsCurrentMonth = month;
      window.earningsCurrentYear = year;

      const iframe = document.getElementById('earningsPreviewIframe');
      const dlBtn = document.getElementById('earningsDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.earningsCurrentBlobUrl = blobUrl; // store to revoke on close
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('earningsPreviewModal').classList.remove('hidden');

    } catch (error) {
      earningsLoadingIndicator.classList.add("hidden");
      printBtn.disabled = false;
      earningsErrorMessage.textContent = error.message || 'Failed to generate report. Please try again.';
      printErrorModal.classList.remove("hidden");
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('earningsPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('earningsPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.earningsCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.earningsCurrentBlobUrl);
      window.earningsCurrentBlobUrl = null;
    }
  }

  document.getElementById('earningsClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('earningsCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('earningsDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.earningsCurrentBlob) return;
    const fmt = window.earningsCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.earningsCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `earnings_deductions_${window.earningsCurrentMonth}_${window.earningsCurrentYear}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url); // revoke immediately after trigger

    earningsSuccessMessage.textContent = `Report downloaded successfully!`;
    printSuccessModal.classList.remove("hidden");
  });

  printSuccessOkBtn.addEventListener("click", () => printSuccessModal.classList.add("hidden"));
  printErrorOkBtn.addEventListener("click", () => printErrorModal.classList.add("hidden"));

  clearPrintBtn.addEventListener("click", () => {
    allTypes.checked = true;
    toggleTypeInput();
    processingYear.value = new Date().getFullYear();
  });

  // ── Init ────────────────────────────────────────────────────────
  toggleTypeInput();
  loadAllDropdowns();
  loadCurrentPeriod();
</script>
