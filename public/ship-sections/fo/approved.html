<div class="p-4">
  <div class="mb-6">
    <p class="text-sm text-blue-900/50 mt-1">
      Forms approved by you — now with CPO for confirmation
    </p>
  </div>
  <div id="fo-approved-list">
    <div class="flex items-center justify-center py-12 text-navy/30">
      <i class="fas fa-spinner fa-spin mr-2"></i>
    </div>
  </div>
</div>
<script>
  (function () {
    const el = document.getElementById("fo-approved-list");

    function loadPage(page) {
      el.innerHTML =
        '<div class="flex items-center justify-center py-12 text-navy/30"><i class="fas fa-spinner fa-spin mr-2"></i></div>';
      fetch(
        "/fo/ship/" +
          encodeURIComponent(ship) +
          "/approved?page=" +
          page +
          "&limit=" +
          FO_APPROVED_PAGE_SIZE,
        { headers: { Authorization: "Bearer " + token } },
      )
        .then((r) => (r.ok ? r.json() : { forms: [], total: 0 }))
        .then((res) => {
          const rows = Array.isArray(res) ? res : res.forms || [];
          const total = Array.isArray(res) ? 1 : res.total || 1;

          if (!rows.length && page === 1) {
            el.innerHTML =
              '<div class="text-center py-12 text-blue-900/30"><i class="fas fa-folder-open fa-2x mb-3 block"></i><p class="font-semibold">No approved forms yet</p></div>';
            return;
          }
          el.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            ${rows
              .map(
                (r) => `
        <div class="flex items-center gap-4 p-4 bg-white/60 rounded-xl border border-amber-100 shadow">
          <div class="w-9 h-9 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-check text-green-500" style="font-size:14px"></i></div>
          <div class="flex-1 min-w-0"><div class="font-bold text-navy text-sm">${r.Surname || ""} ${r.OtherName || ""}</div><div class="text-xs text-blue-900/40 mt-0.5">${r.serviceNumber} · Approved ${r.fo_date ? new Date(r.fo_date).toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" }) : "—"}</div></div>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full bg-green-50 text-green-600 flex-shrink-0">FO APPROVED</span>
        </div>`,
              )
              .join("")} 
            </div>
            ${paginatorHTML(page, Math.ceil(total / FO_APPROVED_PAGE_SIZE), "fo-approved")}`;

          /* paginator click handlers — each click triggers a fresh BE fetch */
          el.querySelectorAll('[data-paginator="fo-approved"]').forEach(
            (btn) => {
              btn.addEventListener("click", () => loadPage(+btn.dataset.page));
            },
          );
        })
        .catch(() => {
          el.innerHTML =
            '<div class="text-center py-8 text-red-400 text-sm">Failed to load</div>';
        });
    }
    loadPage(1); // initial load
  })();
</script>
