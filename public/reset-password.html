<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="styles/output.css" />
    <link rel="stylesheet" href="styles/personnel-login.css" />
  </head>

  <body
    class="bg-gradient-to-br from-blue-100 to-yellow-100 min-h-screen flex items-center justify-center"
  >
    <div
      class="bg-white shadow-2xl rounded-xl p-10 w-full max-w-md border-4 border-yellow-300"
    >
      <!-- Logo -->
      <div class="flex flex-col items-center mb-6">
        <a href="/" class="inline-block hover:opacity-80 transition">
          <img
            src="photos/logo.png"
            alt="Nigerian Navy Emblem"
            class="w-20 h-24 mb-3 cursor-pointer"
          />
        </a>
      </div>

      <!-- Checking token state -->
      <div id="checking-state" class="text-center py-8">
        <div class="flex justify-center mb-4">
          <div class="relative w-10 h-10">
            <div
              class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"
            ></div>
            <div
              class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down"
            ></div>
            <div
              class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand -translate-y-1/2"
            ></div>
          </div>
        </div>
        <p class="text-gray-700 font-semibold">Verifying your reset link...</p>
      </div>

      <!-- Invalid / expired state -->
      <div id="invalid-state" class="hidden text-center py-6">
        <svg
          class="w-16 h-16 text-red-500 mx-auto mb-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
        <h2 id="invalid-title" class="text-xl font-bold text-blue-900 mb-2">
          Link Invalid
        </h2>
        <p id="invalid-message" class="text-gray-600 mb-6">
          This password reset link is invalid.
        </p>
        <a
          href="/personnel-user-login.html"
          class="inline-block w-full bg-yellow-400 text-blue-900 font-bold py-2 rounded-md hover:bg-yellow-500 transition"
        >
          Back to Login
        </a>
      </div>

      <!-- Reset form state -->
      <div id="form-state" class="hidden">
        <h2 class="text-2xl font-bold mb-2 text-center text-blue-700">
          Reset Password
        </h2>
        <p class="text-sm text-gray-600 text-center mb-6">
          Enter your new password below.
        </p>

        <form id="reset-password-form" class="space-y-5">
          <div class="relative">
            <label class="block mb-1 font-semibold text-blue-800"
              >New Password</label
            >
            <input
              type="password"
              id="new-password"
              name="new_password"
              required
              minlength="8"
              class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
            />
            <span
              class="toggle-password"
              data-target="new-password"
              style="
                position: absolute;
                top: 36px;
                right: 10px;
                cursor: pointer;
              "
            >
              <svg
                class="eye-open"
                xmlns="http://www.w3.org/2000/svg"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="gray"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg
                class="eye-closed"
                xmlns="http://www.w3.org/2000/svg"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="gray"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a21.7 21.7 0 014.6-5.94M1 1l22 22"
                />
                <path d="M9.5 9.5a3 3 0 004 4" />
              </svg>
            </span>
            <small id="password-length-msg" class="text-xs"></small>
          </div>

          <div class="relative">
            <label class="block mb-1 font-semibold text-blue-800"
              >Confirm New Password</label
            >
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              required
              minlength="8"
              class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-yellow-400"
            />
            <span
              class="toggle-password"
              data-target="confirm-password"
              style="
                position: absolute;
                top: 36px;
                right: 10px;
                cursor: pointer;
              "
            >
              <svg
                class="eye-open"
                xmlns="http://www.w3.org/2000/svg"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="gray"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg
                class="eye-closed"
                xmlns="http://www.w3.org/2000/svg"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="gray"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a21.7 21.7 0 014.6-5.94M1 1l22 22"
                />
                <path d="M9.5 9.5a3 3 0 004 4" />
              </svg>
            </span>
            <small id="password-match-msg" class="text-xs"></small>
          </div>

          <button
            type="submit"
            id="reset-submit-btn"
            class="w-full bg-yellow-400 text-blue-900 font-bold py-2 rounded-md hover:bg-yellow-500 transition disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Reset Password
          </button>
        </form>
      </div>
    </div>

    <!-- Success Modal -->
    <div
      id="resetSuccessModal"
      class="fixed inset-0 hidden flex items-center justify-center z-50"
    >
      <div class="absolute inset-0 bg-black bg-opacity-50"></div>
      <div
        class="relative bg-white rounded-lg shadow-lg w-11/12 max-w-sm p-6 z-10 text-center"
      >
        <div class="mb-4">
          <svg
            class="w-16 h-16 text-green-600 mx-auto"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
        </div>
        <h3 class="text-xl font-semibold text-gray-900 mb-2">
          Password Reset Successful!
        </h3>
        <p class="text-gray-600 mb-6">
          You can now login with your new password.
        </p>
        <button
          id="go-to-login-btn"
          class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
        >
          Go to Login
        </button>
      </div>
    </div>

    <!-- Alert Modal (errors during submit) -->
    <div
      id="alertModal"
      class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm hidden flex items-center justify-center z-50"
    >
      <div class="absolute inset-0 bg-black bg-opacity-50"></div>
      <div
        class="relative bg-white rounded-lg shadow-lg w-11/12 max-w-md p-6 z-10"
      >
        <div class="flex items-start mb-4">
          <div class="flex-1">
            <h3
              id="alert-title"
              class="text-lg font-semibold mb-2 text-red-600"
            ></h3>
            <p id="alert-message" class="text-gray-700"></p>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-2">
          <button
            id="alert-ok-btn"
            class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700"
          >
            OK
          </button>
        </div>
      </div>
    </div>

    <script src="script/reset-password.js"></script>
  </body>
</html>
