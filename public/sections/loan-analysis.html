<style>
  @keyframes grow-up {
    0% {
      height: 0;
      bottom: 0;
    }

    100% {
      height: 100%;
      bottom: 0;
    }
  }

  @keyframes grow-down {
    0% {
      height: 0;
      top: 0;
    }

    100% {
      height: 100%;
      top: 0;
    }
  }

  @keyframes expand {
    0% {
      width: 0;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    100% {
      width: 100%;
      left: 0;
      transform: translateY(-50%);
    }
  }

  .animate-grow-up {
    animation: grow-up 0.6s ease-in-out infinite alternate;
    position: absolute;
    bottom: 0;
  }

  .animate-grow-down {
    animation: grow-down 0.6s ease-in-out infinite alternate;
    position: absolute;
    top: 0;
  }

  .animate-expand {
    animation: expand 0.6s ease-in-out infinite alternate;
  }
</style>

<!-- Loan Analysis Section -->
<section class="items border rounded-lg m-6 max-w-lg mr-auto p-6 mx-auto">
  <h2 class="text-lg font-bold text-blue-600 mb-4 text-center border-b pb-2">Print Loan Analysis Report</h2>

  <form id="loanForm" class="space-y-4">
    <!-- Processing Month -->
    <div>
      <label for="loanMonth" class="block text-sm font-medium mb-1">Processing Month</label>
      <select id="loanMonth" name="loanMonth"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        <option value="">Select Month</option>
        <option value="1">January</option>
        <option value="2">February</option>
        <option value="3">March</option>
        <option value="4">April</option>
        <option value="5">May</option>
        <option value="6">June</option>
        <option value="7">July</option>
        <option value="8">August</option>
        <option value="9">September</option>
        <option value="10">October</option>
        <option value="11">November</option>
        <option value="12">December</option>
      </select>
    </div>

    <!-- Processing Year -->
    <div>
      <label for="loanYear" class="block text-sm font-medium mb-1">Processing Year</label>
      <input type="number" id="loanYear" name="loanYear"
        class="w-full bg-transparent border border-blue-500 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        placeholder="e.g., 2025" min="2020" max="2099">
    </div>

    <!-- Output Format -->
    <div>
      <label class="block font-medium mb-2">Output Format</label>
      <div class="flex space-x-4">
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="loanFormat" value="pdf" checked>
          <span>PDF</span>
        </label>
        <label class="flex text-sm items-center space-x-2">
          <input type="radio" name="loanFormat" value="excel">
          <span>Excel</span>
        </label>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end space-x-2">
      <button type="reset" id="loanClearBtn" class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600">
        Clear
      </button>
      <button type="button" id="loanPrintBtn"
        class="px-5 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition">
        Generate Report
      </button>
    </div>
  </form>
</section>

<!-- Loading Indicator -->
<div id="loanLoadingIndicator" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-80 p-6 text-center">
    <div class="relative w-10 h-10 mx-auto mb-4">
      <div class="absolute left-1 w-[6px] bg-blue-600 rounded animate-grow-up"></div>
      <div class="absolute right-1 w-[6px] bg-blue-600 rounded animate-grow-down [animation-delay:0.3s]"></div>
      <div
        class="absolute top-1/2 left-1 h-[6px] bg-blue-600 rounded animate-expand [animation-delay:0.6s] -translate-y-1/2">
      </div>
    </div>
    <p class="text-gray-700">Generating report...</p>
  </div>
</div>

<!-- Confirmation Modal -->
<div id="loanConfirmModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6">
    <h3 class="text-lg font-semibold mb-4">Confirm Generation</h3>
    <p class="mb-6 text-gray-700">Do you want to generate the loan analysis report?</p>
    <div class="flex justify-end space-x-2">
      <button id="loanCancelBtn" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="loanContinueBtn"
        class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">Continue</button>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div id="loanSuccessModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-green-600 mb-4">Success</h3>
    <p class="mb-6 text-gray-700" id="loanSuccessMessage">Loan analysis report generated successfully!</p>
    <button id="loanSuccessOkBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">OK</button>
  </div>
</div>

<!-- Error Modal -->
<div id="loanErrorModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg shadow-lg w-96 p-6 text-center">
    <h3 class="text-lg font-semibold text-red-600 mb-4">Error</h3>
    <p class="mb-6 text-gray-700" id="loanErrorMessage">An error occurred.</p>
    <button id="loanErrorOkBtn" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
  </div>
</div>

<!-- Preview Modal -->
<div id="loanPreviewModal"
  class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-gray-50 rounded-lg shadow-lg w-full max-w-5xl max-h-[90vh] overflow-hidden">
    <div class="sticky top-0 bg-navy px-6 py-2 flex justify-between items-center">
      <h3 class="text-lg font-semibold text-white">Loan Analysis Report Preview</h3>
      <button id="loanClosePreviewBtn" class="text-white hover:text-gray-200 text-2xl">&times;</button>
    </div>

    <div class="overflow-auto" style="max-height: calc(90vh - 100px); background: #d1d5db;">
      <iframe id="loanPreviewIframe" title="Loan Analysis Report Preview"
        style="width: 100%; min-height: 842px; border: none; background: white; display: block;">
      </iframe>
    </div>

    <div class="sticky bottom-0 bg-gray-50 border-t px-6 py-2 flex justify-end space-x-2">
      <button id="loanCancelPreviewBtn"
        class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Cancel</button>
      <button id="loanDownloadPreviewBtn"
        class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700">Download</button>
    </div>
  </div>
</div>

<script>
  const auth = window.authService;
  const API_BASE = '/loan';

  const loanPrintBtn = document.getElementById("loanPrintBtn");
  const loanClearBtn = document.getElementById("loanClearBtn");
  const loanMonth = document.getElementById("loanMonth");
  const loanYear = document.getElementById("loanYear");
  const loanLoadingIndicator = document.getElementById("loanLoadingIndicator");

  const loanConfirmModal = document.getElementById("loanConfirmModal");
  const loanCancelBtn = document.getElementById("loanCancelBtn");
  const loanContinueBtn = document.getElementById("loanContinueBtn");

  const loanSuccessModal = document.getElementById("loanSuccessModal");
  const loanSuccessOkBtn = document.getElementById("loanSuccessOkBtn");
  const loanSuccessMessage = document.getElementById("loanSuccessMessage");

  const loanErrorModal = document.getElementById("loanErrorModal");
  const loanErrorOkBtn = document.getElementById("loanErrorOkBtn");
  const loanErrorMessage = document.getElementById("loanErrorMessage");

  // ── Load current period ─────────────────────────────────────────
  async function loadFilters() {
    try {
      const token = localStorage.getItem('token');
      const response = await auth.fetchWithAuth(`/salarysummary/filter-options`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (response.ok) {
        const result = await response.json();
        if (result.success && result.data) {
          const period = result.data.currentPeriod;
          loanYear.value = period.year;
          loanMonth.value = period.month;
        }
      }
    } catch (error) {
      console.error('Error loading current period:', error);
    }
  }

  // ── Validate & show confirm ─────────────────────────────────────
  loanPrintBtn.addEventListener("click", () => {
    if (!loanMonth.value) {
      loanErrorMessage.textContent = 'Please select a processing month.';
      loanErrorModal.classList.remove("hidden"); return;
    }
    if (!loanYear.value) {
      loanErrorMessage.textContent = 'Please enter a processing year.';
      loanErrorModal.classList.remove("hidden"); return;
    }
    loanConfirmModal.classList.remove("hidden");
  });

  loanCancelBtn.addEventListener("click", () => loanConfirmModal.classList.add("hidden"));

  // ── Generate — fetch blob, show in preview iframe ───────────────
  loanContinueBtn.addEventListener("click", async () => {
    loanConfirmModal.classList.add("hidden");
    loanLoadingIndicator.classList.remove("hidden");
    loanPrintBtn.disabled = true;

    const format = document.querySelector('input[name="loanFormat"]:checked').value;
    const month = loanMonth.value;
    const year = loanYear.value;

    try {
      const token = localStorage.getItem('token');

      const params = new URLSearchParams({ format, month, year });

      const response = await auth.fetchWithAuth(`${API_BASE}/generate?${params.toString()}`, {
        method: 'GET',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error || 'Failed to generate report');
      }

      const blob = await response.blob();

      loanLoadingIndicator.classList.add("hidden");
      loanPrintBtn.disabled = false;

      // Store blob for download — no second fetch needed
      window.loanCurrentBlob = blob;
      window.loanCurrentFormat = format;
      window.loanCurrentMonth = month;
      window.loanCurrentYear = year;

      const iframe = document.getElementById('loanPreviewIframe');
      const dlBtn = document.getElementById('loanDownloadPreviewBtn');

      if (format === 'pdf') {
        const blobUrl = window.URL.createObjectURL(blob);
        window.loanCurrentBlobUrl = blobUrl; // store to revoke on close
        iframe.src = blobUrl + '#toolbar=0';
        iframe.style.minHeight = '842px';
        dlBtn.textContent = 'Download PDF';
      } else {
        iframe.srcdoc = `<div style="font-family:Arial,sans-serif;padding:40px;text-align:center;color:#555;">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 16px;display:block;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          <p style="font-size:16pt;font-weight:bold;color:#1e40af;margin-bottom:8px;">Excel Report Ready</p>
          <p style="font-size:10pt;">Click <strong>Download Excel</strong> below to save the file.</p>
        </div>`;
        iframe.style.minHeight = '300px';
        dlBtn.textContent = 'Download Excel';
      }

      document.getElementById('loanPreviewModal').classList.remove('hidden');

    } catch (error) {
      loanLoadingIndicator.classList.add("hidden");
      loanPrintBtn.disabled = false;
      loanErrorMessage.textContent = error.message || 'Failed to generate report. Please try again.';
      loanErrorModal.classList.remove("hidden");
      console.error('Error:', error);
    }
  });

  // ── Preview modal controls ──────────────────────────────────────
  function closePreview() {
    document.getElementById('loanPreviewModal').classList.add('hidden');
    const iframe = document.getElementById('loanPreviewIframe');
    iframe.src = 'about:blank';
    iframe.removeAttribute('srcdoc');
    if (window.loanCurrentBlobUrl) {
      window.URL.revokeObjectURL(window.loanCurrentBlobUrl);
      window.loanCurrentBlobUrl = null;
    }
  }

  document.getElementById('loanClosePreviewBtn').addEventListener('click', closePreview);
  document.getElementById('loanCancelPreviewBtn').addEventListener('click', closePreview);

  document.getElementById('loanDownloadPreviewBtn').addEventListener('click', () => {
    if (!window.loanCurrentBlob) return;
    const fmt = window.loanCurrentFormat || 'pdf';
    const url = window.URL.createObjectURL(window.loanCurrentBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `loan_analysis_${window.loanCurrentMonth}_${window.loanCurrentYear}.${fmt === 'pdf' ? 'pdf' : 'xlsx'}`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(url); // revoke immediately after trigger

    loanSuccessMessage.textContent = 'Report downloaded successfully!';
    loanSuccessModal.classList.remove("hidden");
  });

  loanSuccessOkBtn.addEventListener("click", () => loanSuccessModal.classList.add("hidden"));
  loanErrorOkBtn.addEventListener("click", () => loanErrorModal.classList.add("hidden"));

  loanClearBtn.addEventListener("click", () => {
    loanYear.value = new Date().getFullYear();
  });

  // ── Init ────────────────────────────────────────────────────────
  loadFilters();
</script>
